/* ─────────────────────────────────────
   Muscle Group → Emoji Map
   Must be defined BEFORE INIT_EXERCISES
───────────────────────────────────── */
const MUSCLE_EMOJI = {
  "chest":               "🫁",
  "back":                "🔱",
  "legs":                "🦵",
  "quads":               "🦵",
  "hamstrings":          "🦵",
  "glutes":              "🦵",
  "calves":              "🦵",
  "shoulders":           "🙌",
  "delts":               "🙌",
  "biceps":              "💪",
  "triceps":             "🔻",
  "core":                "🔥",
  "abs":                 "🔥",
  "cardio":              "🏃",
  "full body":           "⚡",
  "back / legs":         "🔱",
  "back / biceps":       "🔱",
  "triceps / chest":     "🔻",
  "chest / triceps":     "🫁",
  "shoulders / triceps": "🙌",
  "legs / glutes":       "🦵",
  "other":               "🏋️",
};

function muscleEmoji(muscle = "") {
  const key = muscle.trim().toLowerCase();
  if (MUSCLE_EMOJI[key]) return MUSCLE_EMOJI[key];
  const order = [
    ["chest",     "🫁"],
    ["back",      "🔱"],
    ["leg",       "🦵"],
    ["quad",      "🦵"],
    ["hamstring", "🦵"],
    ["glute",     "🦵"],
    ["calf",      "🦵"],
    ["shoulder",  "🙌"],
    ["delt",      "🙌"],
    ["bicep",     "💪"],
    ["tricep",    "🔻"],
    ["core",      "🔥"],
    ["abs",       "🔥"],
    ["cardio",    "🏃"],
    ["full",      "⚡"],
  ];
  for (const [kw, em] of order) {
    if (key.includes(kw)) return em;
  }
  return "🏋️";
}

/* ─────────────────────────────────────

const INIT_EXERCISES = [
  { id: "bench",  name: "Bench Press",    muscle: "Chest" },
  { id: "squat",  name: "Squat",          muscle: "Legs" },
  { id: "dead",   name: "Deadlift",       muscle: "Back / Legs" },

].map(e => ({ ...e, emoji: muscleEmoji(e.muscle) }));

const todayStr = () => new Date().toISOString().slice(0, 10);
const fmtDate  = (s) => { const d = new Date(s + "T00:00:00"); return `${d.getMonth()+1}/${d.getDate()}`; };
const DAYS     = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const uid      = () => Math.random().toString(36).slice(2, 9);
const pad2     = (n) => String(n).padStart(2, "0");

/* ─────────────────────────────────────
   Goal Achievement Helpers
───────────────────────────────────── */
// Given an active program + date's logs, find the target for a given exercise
// Returns null if no active program session targets this exercise today
function getGoalForLog(log, activeProg, programs) {
  if (!activeProg || activeProg.done) return null;
  const prog = programs.find(p => p.id === activeProg.progId);
  if (!prog) return null;
  const session = prog.sessions[activeProg.sessionIdx];
  if (!session) return null;
  const item = session.items.find(it => it.exId === log.exerciseId);
  if (!item) return null;
  return {
    sets:   parseInt(item.sets)   || 0,
    reps:   parseInt(item.reps)   || 0,
    weight: parseFloat(item.weight) || 0,
    label:  session.label,
    progName: prog.name,
  };
}

// Compare actual sets vs goal — returns per-set status + overall
function evaluateSets(actualSets, goal) {
  if (!goal) return null;
  const results = actualSets.map(s => {
    const rOk = (+s.reps)  >= goal.reps;
    const wOk = goal.weight > 0 ? (+s.weight) >= goal.weight : true;
    return { rOk, wOk, ok: rOk && wOk };
  });
  const targetSets = goal.sets;
  const doneSets   = results.filter(r => r.ok).length;
  const pct        = targetSets > 0 ? Math.min(100, Math.round((doneSets / targetSets) * 100)) : 0;
  const allDone    = doneSets >= targetSets;
  return { results, doneSets, targetSets, pct, allDone };
}

/* ─────────────────────────────────────
   Chart Tooltip
───────────────────────────────────── */
function ChartTooltip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background:"#1a1a1e", border:"1px solid #ff4e00", borderRadius:8, padding:"8px 14px" }}>
      <div style={{ color:"#ff4e00", fontWeight:900, fontSize:12, marginBottom:3 }}>{label}</div>
      <div style={{ color:"#f5f0e8", fontWeight:700 }}>{payload[0].value.toLocaleString()} kg</div>
    </div>
  );
}

/* ─────────────────────────────────────
   Rest Timer
───────────────────────────────────── */
function RestTimer({ onClose, initialSec = 90 }) {
  const PRESETS = [60, 90, 120, 180, 240, 300];
  const [total,   setTotal]   = useState(initialSec);
  const [left,    setLeft]    = useState(initialSec);
  const [running, setRunning] = useState(true);   // auto-start
  const [done,    setDone]    = useState(false);
  const intervalRef = useRef(null);

  const start = useCallback((sec) => {
    const t = sec ?? total;
    clearInterval(intervalRef.current);
    setTotal(t); setLeft(t); setDone(false); setRunning(true);
  }, [total]);

  const reset  = () => { clearInterval(intervalRef.current); setLeft(total); setRunning(false); setDone(false); };
  const toggle = () => setRunning(r => !r);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setLeft(l => {
          if (l <= 1) { clearInterval(intervalRef.current); setRunning(false); setDone(true); return 0; }
          return l - 1;
        });
      }, 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [running]);

  const pct  = total > 0 ? (left / total) * 100 : 0;
  const r    = 54;
  const circ = 2 * Math.PI * r;
  const dash = circ * (1 - pct / 100);

  return (
    <div style={{
      position:"fixed", inset:0, background:"rgba(0,0,0,.78)", zIndex:9000,
      display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(4px)"
    }}>
      <div style={{
        background:"#16161a", border:"1px solid #2a2a32", borderRadius:20,
        padding:"32px 36px", width:340, textAlign:"center",
        boxShadow:"0 24px 64px rgba(0,0,0,.7)"
      }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 }}>
          <div style={{ fontSize:10, letterSpacing:3, color:"#ff4e00", fontWeight:700 }}>⏱ REST TIMER</div>
          <button onClick={onClose} style={{ background:"transparent", border:"none", color:"#555", cursor:"pointer", fontSize:20, lineHeight:1 }}>✕</button>
        </div>

        {/* Circular timer */}
        <div style={{ position:"relative", width:130, height:130, margin:"0 auto 24px" }}>
          <svg width="130" height="130" style={{ transform:"rotate(-90deg)" }}>
            <circle cx="65" cy="65" r={r} fill="none" stroke="#1e1e26" strokeWidth="8" />
            <circle cx="65" cy="65" r={r} fill="none"
              stroke={done ? "#48bb78" : running ? "#ff4e00" : "#444"}
              strokeWidth="8" strokeLinecap="round"
              strokeDasharray={circ} strokeDashoffset={dash}
              style={{ transition:"stroke-dashoffset .9s linear, stroke .3s" }} />
          </svg>
          <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
            {done ? (
              <div style={{ fontSize:32, lineHeight:1 }}>✅</div>
            ) : (
              <>
                <div style={{ fontFamily:"'Bebas Neue',cursive", fontSize:38, color:"#f5f0e8", lineHeight:1 }}>
                  {pad2(Math.floor(left/60))}:{pad2(left%60)}
                </div>
                <div style={{ fontSize:10, color:"#555", marginTop:2 }}>{total}s</div>
              </>
            )}
          </div>
        </div>

        {done && <div style={{ color:"#48bb78", fontWeight:700, fontSize:14, marginBottom:16 }}>Rest complete! Next set 💪</div>}

        {/* Preset buttons */}
        <div style={{ display:"flex", gap:6, justifyContent:"center", marginBottom:18, flexWrap:"wrap" }}>
          {PRESETS.map(s => (
            <button key={s} onClick={() => start(s)} style={{
              padding:"5px 11px",
              background: total===s&&!done ? "rgba(255,78,0,.15)" : "#1e1e26",
              border:`1px solid ${total===s&&!done ? "#ff4e00" : "#2a2a32"}`,
              borderRadius:6, color: total===s&&!done ? "#ff4e00" : "#888",
              fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"inherit", transition:"all .15s"
            }}>
              {s>=60 ? `${Math.floor(s/60)}m${s%60?s%60+"s":""}` : `${s}s`}
            </button>
          ))}
        </div>

        <div style={{ display:"flex", gap:10 }}>
          <button onClick={toggle} style={{
            flex:2, padding:"11px 0",
            background: running ? "#1e1e26" : "#ff4e00",
            border:`1px solid ${running ? "#333" : "#ff4e00"}`,
            borderRadius:9, color:"#fff", fontWeight:700, fontSize:14,
            cursor:"pointer", fontFamily:"inherit", transition:"all .15s"
          }}>
            {running ? "⏸ Pause" : done ? "🔄 Restart" : "▶ Start"}
          </button>
          <button onClick={reset} style={{
            flex:1, padding:"11px 0", background:"transparent",
            border:"1px solid #2a2a32", borderRadius:9, color:"#666",
            fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"inherit"
          }}>Reset</button>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────
   Main App
───────────────────────────────────── */
function App() {
  const [exercises,  setExercises]  = useState(INIT_EXERCISES);
  const [logs,       setLogs]       = useState([]);
  const [tab,        setTab]        = useState("record");
  const [date,       setDate]       = useState(todayStr());

  const [selEx,  setSelEx]  = useState(INIT_EXERCISES[0].id);
  const [sets,   setSets]   = useState([{ reps:"", weight:"" }]);
  const [note,   setNote]   = useState("");
  const [editId, setEditId] = useState(null);

  const [chartEx, setChartEx] = useState(INIT_EXERCISES[0].id);
  const [metric,  setMetric]  = useState("weight");

  const [newName,   setNewName]   = useState("");
  const [newMuscle, setNewMuscle] = useState("");
  const [newEmoji,  setNewEmoji]  = useState("🏋️");

  const [showTimer,     setShowTimer]     = useState(false);
  const [timerInitSec,  setTimerInitSec]  = useState(90);
  const [restSec,       setRestSec]       = useState(90);
  const [completedSets, setCompletedSets] = useState([]);

  /* ── Quick-add exercise (inline) ── */
  const [showQuickAdd, setShowQuickAdd] = useState(false);
  const [qaName,   setQaName]   = useState("");
  const [qaEmoji,  setQaEmoji]  = useState("🏋️");
  const [qaMuscle, setQaMuscle] = useState("");

  /* ── Cycle programs ── */
  const [programs,   setPrograms]   = useState([]);
  const [progTab,    setProgTab]    = useState("list");
  const [editProg,   setEditProg]   = useState(null);
  const [activeProg, setActiveProg] = useState(null);

  const [toast, setToast] = useState(null);
  const showToast = (msg, type="ok") => { setToast({msg,type}); setTimeout(()=>setToast(null),2200); };

  /* ── localStorage persistence ── */
  useEffect(() => {
    try {
      const saved = localStorage.getItem('liftlog_v1');
      if (saved) {
        const d = JSON.parse(saved);
        if (d.exercises) setExercises(d.exercises);
        if (d.logs)      setLogs(d.logs);
        if (d.programs)  setPrograms(d.programs);
        if (d.activeProg !== undefined) setActiveProg(d.activeProg);
      }
    } catch(e) { console.warn('Load failed', e); }
  }, []);

  useEffect(() => {
    try {
      localStorage.setItem('liftlog_v1', JSON.stringify({exercises, logs, programs, activeProg}));
    } catch(e) { console.warn('Save failed', e); }
  }, [exercises, logs, programs, activeProg]);



  /* ── Set helpers ── */
  const updateSet = (i, field, val) => setSets(s => s.map((r,idx) => idx===i ? {...r,[field]:val} : r));
  const addSet    = () => setSets(s => [...s, { reps:"", weight:"" }]);
  const removeSet = (i) => {
    setSets(s => s.filter((_,idx) => idx !== i));
    setCompletedSets(c => c.filter(x => x !== i).map(x => x > i ? x-1 : x));
  };
  const markSetDone = (i) => {
    if (!sets[i].reps || !sets[i].weight) { showToast("Fill in reps & weight first!", "err"); return; }
    setCompletedSets(c => c.includes(i) ? c : [...c, i]);
    if (i === sets.length - 1) setSets(s => [...s, { reps:"", weight:"" }]);
    setTimerInitSec(restSec);
    setShowTimer(true);
  };

  const saveLog = () => {
    const validSets = sets.filter(s => s.reps && s.weight);
    if (!validSets.length) { showToast("Please fill in set info!", "err"); return; }
    if (editId) {
      setLogs(l => l.map(e => e.id===editId ? {...e,exerciseId:selEx,date,sets:validSets,note} : e));
      setEditId(null); showToast("Updated ✏️");
    } else {
      setLogs(l => [...l, {id:uid(),exerciseId:selEx,date,sets:validSets,note}]);
      showToast("Saved! 💪");
    }
    setSets([{reps:"",weight:""}]); setNote(""); setCompletedSets([]);
  };

  const deleteLog = (id) => { setLogs(l => l.filter(e => e.id!==id)); showToast("Deleted"); };
  const startEdit = (log) => {
    setSelEx(log.exerciseId); setSets(log.sets.map(s=>({...s}))); setNote(log.note||"");
    setEditId(log.id); setDate(log.date); setTab("record");
  };

  const todayLogs = logs.filter(l => l.date===date);

  const dayStats = useMemo(() => {
    let vol=0, topW=0;
    todayLogs.forEach(l => l.sets.forEach(s => { const w=+s.weight,r=+s.reps; vol+=w*r; if(w>topW)topW=w; }));
    return {vol,topW,cnt:todayLogs.length};
  }, [todayLogs]);

  const chartData = useMemo(() =>
    logs.filter(l=>l.exerciseId===chartEx).sort((a,b)=>a.date.localeCompare(b.date))
      .map(l => {
        const maxW = Math.max(...l.sets.map(s=>+s.weight).filter(Boolean), 0);
        const vol  = l.sets.reduce((s,e)=>s+(+e.weight)*(+e.reps),0);
        return {date:fmtDate(l.date),weight:maxW,volume:vol};
      })
  , [logs,chartEx]);

  const chartAvg = chartData.length
    ? Math.round(chartData.reduce((s,d)=>s+(metric==="weight"?d.weight:d.volume),0)/chartData.length) : 0;

  const addExercise = () => {
    if (!newName.trim()) { showToast("Please enter a name!", "err"); return; }
    const m=newMuscle.trim()||"Other"; setExercises(e=>[...e,{id:uid(),name:newName.trim(),emoji:muscleEmoji(m),muscle:m}]);
    setNewName(""); setNewMuscle(""); setNewEmoji("🏋️"); showToast("Exercise added ✨");
  };

  const quickAddExercise = () => {
    if (!qaName.trim()) { showToast("Please enter a name!", "err"); return; }
    const qm=qaMuscle.trim()||"Other"; const newEx = {id:uid(), name:qaName.trim(), emoji:muscleEmoji(qm), muscle:qm};
    setExercises(e=>[...e, newEx]);
    setSelEx(newEx.id);
    setQaName(""); setQaEmoji("🏋️"); setQaMuscle(""); setShowQuickAdd(false);
    showToast(`'${newEx.name}' added ✨`);
  };

  const deleteExercise = (id) => {
    setExercises(e=>e.filter(x=>x.id!==id)); setLogs(l=>l.filter(x=>x.exerciseId!==id)); showToast("Deleted");
  };

  const historyDates = useMemo(()=>[...new Set(logs.map(l=>l.date))].sort((a,b)=>b.localeCompare(a)),[logs]);

  /* ── Program helpers ── */
  const newBlankSession = (label) => ({
    id:uid(), label,
    items:[{id:uid(),exId:INIT_EXERCISES[0].id,sets:"3",reps:"10",weight:"",restTime:"90"}]
  });

  const startNewProgram = () => {
    setEditProg({id:uid(),name:"",totalCycles:3,sessions:Array.from({length:6},(_,i)=>newBlankSession(`Day ${i+1}`))});
    setProgTab("edit");
  };

  const saveProgram = () => {
    if (!editProg.name.trim()) { showToast("Please enter a program name!", "err"); return; }
    setPrograms(p => { const ex=p.find(x=>x.id===editProg.id); return ex?p.map(x=>x.id===editProg.id?editProg:x):[...p,editProg]; });
    setEditProg(null); setProgTab("list"); showToast("Program saved! 🎯");
  };

  const updateSession         = (sIdx,field,val) => setEditProg(p=>({...p,sessions:p.sessions.map((s,i)=>i===sIdx?{...s,[field]:val}:s)}));
  const addItemToSession      = (sIdx) => setEditProg(p=>({...p,sessions:p.sessions.map((s,i)=>i===sIdx?{...s,items:[...s.items,{id:uid(),exId:INIT_EXERCISES[0].id,sets:"3",reps:"10",weight:"",restTime:"90"}]}:s)}));
  const removeItemFromSession = (sIdx,iIdx) => setEditProg(p=>({...p,sessions:p.sessions.map((s,i)=>i===sIdx?{...s,items:s.items.filter((_,j)=>j!==iIdx)}:s)}));
  const updateItem            = (sIdx,iIdx,field,val) => setEditProg(p=>({...p,sessions:p.sessions.map((s,i)=>i===sIdx?{...s,items:s.items.map((it,j)=>j===iIdx?{...it,[field]:val}:it)}:s)}));
  const addSession            = () => setEditProg(p=>({...p,sessions:[...p.sessions,newBlankSession(`Day ${p.sessions.length+1}`)]}));
  const removeSession         = (sIdx) => setEditProg(p=>({...p,sessions:p.sessions.filter((_,i)=>i!==sIdx)}));

  const startProgram = (prog) => { setActiveProg({progId:prog.id,cycle:1,sessionIdx:0,done:false}); setProgTab("progress"); };

  const applySessionToLog = () => {
    if (!activeProg) return;
    const prog = programs.find(p=>p.id===activeProg.progId);
    if (!prog) return;
    const session = prog.sessions[activeProg.sessionIdx];
    const today = todayStr();
    const newLogs = session.items.map(it=>({
      id:uid(), exerciseId:it.exId, date:today,
      sets:Array.from({length:+it.sets||1},()=>({reps:it.reps,weight:it.weight||"0"})),
      note:`[${prog.name}] Cycle ${activeProg.cycle} - ${session.label}`
    }));
    setLogs(l=>[...l,...newLogs]);

    const nextIdx = activeProg.sessionIdx + 1;
    if (nextIdx >= prog.sessions.length) {
      if (activeProg.cycle >= prog.totalCycles) {
        setActiveProg(prev=>({...prev,done:true})); showToast(`🏆 ${prog.name} complete!`);
      } else {
        setActiveProg(prev=>({...prev,cycle:prev.cycle+1,sessionIdx:0})); showToast(`Cycle ${activeProg.cycle+1} started! 🔥`);
      }
    } else {
      setActiveProg(prev=>({...prev,sessionIdx:nextIdx})); showToast("Session logged! ▶ Next session");
    }
    // Pre-load rest time from first item of next session (if available)
    const nextProg = programs.find(p=>p.id===activeProg.progId);
    const nextSession = nextProg?.sessions[activeProg.sessionIdx+1] ?? nextProg?.sessions[0];
    const firstItem = nextSession?.items?.[0];
    if (firstItem?.restTime) setRestSec(+firstItem.restTime || 90);
    setTab("record"); setDate(today);
  };

  const deleteProgram = (id) => {
    setPrograms(p=>p.filter(x=>x.id!==id));
    if (activeProg?.progId===id) setActiveProg(null);
    showToast("Program deleted");
  };

  const activeProgData = activeProg ? programs.find(p=>p.id===activeProg.progId) : null;
  const totalSessions  = activeProgData ? activeProgData.sessions.length * activeProgData.totalCycles : 0;
  const doneSessions   = activeProg
    ? (activeProg.cycle-1)*(activeProgData?.sessions.length||0) + (activeProg.done ? totalSessions : activeProg.sessionIdx)
    : 0;


  /* ── Excel Export ── */
  const exportToExcel = () => {
    if (!logs.length) { showToast("No logs to export!", "err"); return; }

    // Build CSV rows
    const rows = [
      ["Date", "Day", "Exercise", "Muscle Group", "Set", "Reps", "Weight (kg)", "Volume (kg)", "Notes"]
    ];
    const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    // Sort logs by date desc
    const sorted = [...logs].sort((a,b) => b.date.localeCompare(a.date));
    sorted.forEach(log => {
      const ex = exercises.find(x => x.id === log.exerciseId);
      const d  = new Date(log.date + "T00:00:00");
      log.sets.forEach((s, i) => {
        rows.push([
          log.date,
          dayNames[d.getDay()],
          ex?.name || "Deleted",
          ex?.muscle || "",
          i + 1,
          s.reps,
          s.weight,
          ((+s.reps) * (+s.weight)).toFixed(1),
          i === 0 ? (log.note || "") : ""
        ]);
      });
    });

    // Convert to CSV
    const csv = rows.map(r =>
      r.map(cell => {
        const str = String(cell ?? "");
        return str.includes(",") || str.includes('"') || str.includes("\n")
          ? '"' + str.replace(/"/g, '""') + '"'
          : str;
      }).join(",")
    ).join("\n");

    // Add BOM for Excel UTF-8 detection
    const bom = "\uFEFF";
    const blob = new Blob([bom + csv], { type: "text/csv;charset=utf-8;" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `liftlog_${todayStr()}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("Downloaded! Open in Excel 📊");
  };

  /* ── CSS ── */
  const css = `
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;700&family=Bebas+Neue&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#111114}::-webkit-scrollbar-thumb{background:#ff4e00;border-radius:2px}
    input,select,textarea{outline:none;font-family:inherit;color-scheme:dark}
    .ipt{width:100%;padding:9px 13px;background:#1c1c20;border:1px solid #2e2e36;border-radius:8px;color:#f5f0e8;font-size:13px;transition:border .15s}
    .ipt:focus{border-color:#ff4e00}
    .ipt-sm{padding:7px 10px;font-size:13px}
    .btn-og{padding:10px 22px;background:#ff4e00;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:.3px;transition:all .15s;font-family:inherit}
    .btn-og:hover{background:#ff6620;transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,78,0,.35)}
    .btn-og:active{transform:none}
    .btn-line{padding:7px 14px;background:transparent;border:1px solid #333;border-radius:7px;color:#888;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
    .btn-line:hover{border-color:#ff4e00;color:#ff4e00}
    .btn-del{padding:5px 9px;background:transparent;border:1px solid transparent;border-radius:6px;color:#555;font-size:12px;cursor:pointer;transition:all .15s}
    .btn-del:hover{border-color:#ff4e00;color:#ff4e00;background:rgba(255,78,0,.08)}
    .btn-green{padding:10px 22px;background:#276749;color:#9ae6b4;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
    .btn-green:hover{background:#2f855a}
    .card{background:#18181c;border:1px solid #27272d;border-radius:14px}
    .tab{padding:9px 0;background:transparent;border:none;color:#555;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.3px;white-space:nowrap}
    .tab.on{color:#ff4e00;border-bottom-color:#ff4e00}
    .chip{display:inline-flex;align-items:center;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(255,78,0,.12);color:#ff4e00}
    .badge{width:38px;height:38px;border-radius:10px;background:#1e1e24;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .set-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #22222a}
    .set-row:last-child{border-bottom:none}
    .num{font-family:'Bebas Neue',cursive;letter-spacing:1px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .fade{animation:fadeUp .25s ease}
    @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
    .prog-tab{padding:7px 14px;background:transparent;border:1px solid #27272d;border-radius:7px;color:#666;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
    .prog-tab.on{background:rgba(255,78,0,.12);border-color:#ff4e00;color:#ff4e00}
    .session-card{background:#1a1a1e;border:1px solid #27272d;border-radius:12px;padding:16px;margin-bottom:10px}
    .progress-bar-bg{background:#1e1e26;border-radius:999px;height:6px;overflow:hidden}
    .progress-bar-fill{background:linear-gradient(90deg,#ff4e00,#ff8c00);height:100%;border-radius:999px;transition:width .4s ease}
    .session-dot{flex:1 0 calc(33% - 8px);min-width:88px;padding:10px 12px;border-radius:10px;text-align:center;cursor:default;transition:all .2s}
    .goal-bar-bg{background:#1e1e26;border-radius:999px;height:5px;overflow:hidden}
    .card-achieved{border-color:#2d6a2d !important}
    .card-missed{border-color:#6a2d2d !important}
  `;

  return (
    <div style={{ fontFamily:"'IBM Plex Sans','Helvetica Neue',sans-serif", background:"#111114", minHeight:"100vh", color:"#f5f0e8" }}>
      <style>{css}</style>

      {/* Toast */}
      {toast && (
        <div style={{ position:"fixed",top:20,right:20,zIndex:9999,
          background:toast.type==="err"?"#2a1414":"#1a2a1a",
          border:`1px solid ${toast.type==="err"?"#ff4e00":"#2d7a2d"}`,
          borderRadius:10,padding:"10px 18px",fontSize:13,fontWeight:700,
          color:toast.type==="err"?"#ff6e50":"#6fcf6f",
          animation:"toastIn .2s ease",boxShadow:"0 8px 24px rgba(0,0,0,.5)"
        }}>{toast.msg}</div>
      )}

      {showTimer && <RestTimer onClose={()=>setShowTimer(false)} initialSec={timerInitSec} />}

      <div style={{ maxWidth:680,margin:"0 auto",padding:"28px 20px 80px" }}>

        {/* ── Header ── */}
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:28 }}>
          <div>
            <div style={{ fontSize:11,letterSpacing:4,color:"#ff4e00",fontWeight:700,marginBottom:4,textTransform:"uppercase" }}>Weight Training</div>
            <h1 style={{ fontFamily:"'Bebas Neue',cursive",fontSize:44,letterSpacing:2,lineHeight:1 }}>
              LIFT<span style={{ color:"#ff4e00" }}>.</span>LOG
            </h1>
          </div>
          <div style={{ display:"flex",gap:10,alignItems:"flex-end" }}>
            <button onClick={exportToExcel} style={{
              padding:"10px 16px",background:"#1c1c20",border:"1px solid #2e2e36",
              borderRadius:10,color:"#f5f0e8",cursor:"pointer",fontFamily:"inherit",
              fontWeight:700,fontSize:13,transition:"all .15s"
            }}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#276749";e.currentTarget.style.color="#68d391";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="#2e2e36";e.currentTarget.style.color="#f5f0e8";}}
            >📊 Export</button>
            <button onClick={()=>setShowTimer(true)} style={{
              padding:"10px 16px",background:"#1c1c20",border:"1px solid #2e2e36",
              borderRadius:10,color:"#f5f0e8",cursor:"pointer",fontFamily:"inherit",
              fontWeight:700,fontSize:13,transition:"all .15s"
            }}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#ff4e00";e.currentTarget.style.color="#ff4e00";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="#2e2e36";e.currentTarget.style.color="#f5f0e8";}}
            >⏱ Rest</button>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:10,color:"#444",marginBottom:2,letterSpacing:1 }}>SESSIONS</div>
              <div style={{ fontFamily:"'Bebas Neue',cursive",fontSize:38,color:"#ff4e00",lineHeight:1 }}>
                {[...new Set(logs.map(l=>l.date))].length}
              </div>
            </div>
          </div>
        </div>

        {/* ── Active Program Banner ── */}
        {activeProgData && !activeProg?.done && (
          <div style={{
            background:"linear-gradient(135deg,#1a1410,#201810)",
            border:"1px solid #3a2a10",borderRadius:14,padding:"14px 18px",
            marginBottom:20,cursor:"pointer"
          }} onClick={()=>setTab("program")}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8 }}>
              <div>
                <div style={{ fontSize:10,letterSpacing:2,color:"#ff8c00",fontWeight:700,marginBottom:2 }}>▸ IN PROGRESS</div>
                <div style={{ fontWeight:700,fontSize:14 }}>{activeProgData.name}</div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:10,color:"#666" }}>Cycle {activeProg.cycle}/{activeProgData.totalCycles}</div>
                <div style={{ fontSize:12,color:"#ff8c00",fontWeight:700 }}>{activeProgData.sessions[activeProg.sessionIdx]?.label}</div>
              </div>
            </div>
            <div className="progress-bar-bg">
              <div className="progress-bar-fill" style={{ width:`${(doneSessions/totalSessions)*100}%` }}/>
            </div>
            <div style={{ fontSize:10,color:"#555",marginTop:4,textAlign:"right" }}>{doneSessions}/{totalSessions} sessions</div>
          </div>
        )}

        {/* ── Tabs ── */}
        <div style={{ display:"flex",gap:16,borderBottom:"1px solid #222",marginBottom:24,overflowX:"auto" }}>
          {[["record","Log"],["history","History"],["chart","Stats"],["program","Program"],["manage","Exercises"]].map(([k,v])=>(
            <button key={k} className={`tab${tab===k?" on":""}`} onClick={()=>setTab(k)}>{v}</button>
          ))}
        </div>

        {/* ══════ TAB: Log ══════ */}
        {tab==="record" && (
          <div className="fade" style={{ display:"flex",flexDirection:"column",gap:16 }}>
            <div style={{ display:"flex",gap:10,alignItems:"center" }}>
              <input type="date" className="ipt" value={date} onChange={e=>setDate(e.target.value)} style={{ flex:1 }}/>
              {dayStats.cnt>0 && (
                <div style={{ display:"flex",gap:8,flexShrink:0 }}>
                  {[{l:"VOLUME",v:dayStats.vol.toLocaleString(),u:"kg",c:"#ff4e00"},{l:"BEST",v:dayStats.topW,u:"kg",c:"#f5f0e8"},{l:"LIFTS",v:dayStats.cnt,u:"exercises",c:"#f5f0e8"}].map((s,i)=>(
                    <div key={i} style={{ background:"#1c1c20",border:"1px solid #2e2e36",borderRadius:8,padding:"6px 12px",textAlign:"center" }}>
                      <div style={{ fontSize:9,color:"#555",letterSpacing:1,marginBottom:1 }}>{s.l}</div>
                      <div className="num" style={{ fontSize:18,color:s.c }}>{s.v}</div>
                      <div style={{ fontSize:9,color:"#444" }}>{s.u}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="card" style={{ padding:20 }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14 }}>
                <div style={{ fontSize:10,letterSpacing:2,color:"#555",fontWeight:700 }}>{editId?"▸ EDITING":"▸ NEW SET"}</div>
                <button onClick={()=>setShowTimer(true)} style={{
                  padding:"5px 12px",background:"rgba(255,78,0,.1)",border:"1px solid rgba(255,78,0,.3)",
                  borderRadius:6,color:"#ff8050",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"
                }}>⏱ Rest Timer</button>
              </div>

              {/* Exercise selector + quick add */}
              <div style={{ display:"flex",gap:8,marginBottom: showQuickAdd ? 0 : 14 }}>
                <select className="ipt" value={selEx} onChange={e=>setSelEx(e.target.value)} style={{ flex:1 }}>
                  {exercises.map(e=><option key={e.id} value={e.id}>{muscleEmoji(e.muscle)} {e.name}  ({e.muscle})</option>)}
                </select>
                <button onClick={()=>setShowQuickAdd(v=>!v)} title="Add new exercise" style={{
                  flexShrink:0, width:40, background: showQuickAdd?"rgba(255,78,0,.15)":"#1c1c20",
                  border:`1px solid ${showQuickAdd?"#ff4e00":"#2e2e36"}`,
                  borderRadius:8, color: showQuickAdd?"#ff4e00":"#888",
                  fontSize:20, cursor:"pointer", lineHeight:1, transition:"all .15s"
                }}>+</button>
              </div>

              {/* Quick-add panel */}
              {showQuickAdd && (
                <div style={{
                  background:"#13131a", border:"1px solid rgba(255,78,0,.25)", borderRadius:10,
                  padding:14, marginBottom:14, display:"flex", flexDirection:"column", gap:8
                }}>
                  <div style={{ fontSize:10,letterSpacing:2,color:"#ff4e00",fontWeight:700,marginBottom:2 }}>▸ ADD NEW EXERCISE</div>
                  <div style={{ display:"flex",gap:8 }}>
                    <input className="ipt ipt-sm" placeholder="Exercise name (e.g. Incline Bench)" value={qaName}
                      onChange={e=>setQaName(e.target.value)}
                      onKeyDown={e=>e.key==="Enter"&&quickAddExercise()}
                      style={{ flex:1 }} autoFocus />
                  </div>
                  <input className="ipt ipt-sm" placeholder="Muscle group (e.g. Upper Chest, optional)" value={qaMuscle}
                    onChange={e=>setQaMuscle(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&quickAddExercise()} />
                  <div style={{ display:"flex",gap:8 }}>
                    <button className="btn-og" onClick={quickAddExercise} style={{ flex:1,padding:"8px 0",fontSize:13 }}>
                      ✨ Add & Select
                    </button>
                    <button className="btn-line" onClick={()=>{setShowQuickAdd(false);setQaName("");setQaEmoji("🏋️");setQaMuscle("");}}>
                      Cancel
                    </button>
                  </div>
                </div>
              )}

              {/* Sets table */}
              <div style={{ marginBottom:12 }}>
                <div style={{ display:"flex",gap:8,marginBottom:6,alignItems:"center" }}>
                  <div style={{ flex:"0 0 30px",fontSize:10,color:"#444",textAlign:"center" }}>SET</div>
                  <div style={{ flex:1,fontSize:10,color:"#444" }}>REPS</div>
                  <div style={{ flex:1,fontSize:10,color:"#444" }}>WEIGHT (kg)</div>
                  <div style={{ flex:"0 0 64px",fontSize:10,color:"#444",textAlign:"center" }}>DONE</div>
                  <div style={{ width:24 }}/>
                </div>
                {sets.map((s,i)=>{
                  const isDone = completedSets.includes(i);
                  return (
                    <div key={i} className="set-row" style={{
                      background: isDone ? "rgba(56,161,105,.08)" : "transparent",
                      borderRadius: isDone ? 7 : 0,
                      transition:"background .2s"
                    }}>
                      <div style={{ flex:"0 0 30px",textAlign:"center" }}>
                        <span className="num" style={{ fontSize:15, color: isDone ? "#68d391" : "#ff4e00" }}>{i+1}</span>
                      </div>
                      <input className="ipt ipt-sm" type="number" placeholder="12" value={s.reps}
                        onChange={e=>updateSet(i,"reps",e.target.value)} style={{ flex:1, opacity: isDone?.6:1 }}/>
                      <input className="ipt ipt-sm" type="number" placeholder="60" value={s.weight}
                        onChange={e=>updateSet(i,"weight",e.target.value)} style={{ flex:1, opacity: isDone?.6:1 }}/>
                      {/* Done button */}
                      <button onClick={()=>isDone ? null : markSetDone(i)} style={{
                        flex:"0 0 56px", padding:"6px 0", borderRadius:7, fontWeight:700, fontSize:12,
                        cursor: isDone ? "default" : "pointer", fontFamily:"inherit", transition:"all .2s",
                        background: isDone ? "rgba(56,161,105,.2)"  : "rgba(255,78,0,.1)",
                        border:     isDone ? "1px solid #276749"     : "1px solid rgba(255,78,0,.4)",
                        color:      isDone ? "#68d391"               : "#ff8050",
                      }}>{isDone ? "✓" : "Done"}</button>
                      <button className="btn-del" onClick={()=>removeSet(i)} disabled={sets.length===1} style={{ width:24,padding:"5px 0" }}>✕</button>
                    </div>
                  );
                })}
              </div>

              {/* Rest time setting */}
              <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:12,
                padding:"10px 14px",background:"#13131a",border:"1px solid #22222a",borderRadius:9 }}>
                <span style={{ fontSize:12,color:"#666",whiteSpace:"nowrap",fontWeight:600 }}>⏱ Rest</span>
                <div style={{ display:"flex",gap:5,flex:1,flexWrap:"wrap" }}>
                  {[60,90,120,180,240,300].map(s=>(
                    <button key={s} onClick={()=>setRestSec(s)} style={{
                      padding:"4px 9px", borderRadius:5, fontSize:11, fontWeight:700,
                      cursor:"pointer", fontFamily:"inherit", transition:"all .15s",
                      background: restSec===s ? "rgba(255,78,0,.15)" : "#1c1c22",
                      border:     restSec===s ? "1px solid #ff4e00"  : "1px solid #2a2a32",
                      color:      restSec===s ? "#ff4e00"             : "#666",
                    }}>{s>=60?`${Math.floor(s/60)}m${s%60?s%60+"s":""}`:s+"s"}</button>
                  ))}
                </div>
                <div style={{ display:"flex",alignItems:"center",gap:5 }}>
                  <input type="number" value={restSec} onChange={e=>setRestSec(Math.max(10,+e.target.value))}
                    style={{ width:52,padding:"4px 7px",background:"#1c1c22",border:"1px solid #2a2a32",
                      borderRadius:6,color:"#f5f0e8",fontSize:12,textAlign:"center" }}/>
                  <span style={{ fontSize:11,color:"#555" }}>sec</span>
                </div>
              </div>

              <button className="btn-line" onClick={addSet} style={{ width:"100%",marginBottom:12,fontSize:13 }}>+ Add Set</button>
              <input className="ipt" placeholder="Notes (optional)" value={note} onChange={e=>setNote(e.target.value)} style={{ marginBottom:14 }}/>
              <div style={{ display:"flex",gap:8 }}>
                <button className="btn-og" onClick={saveLog} style={{ flex:1 }}>{editId?"✏️  Save Changes":"💾  Save"}</button>
                {editId && <button className="btn-line" onClick={()=>{setEditId(null);setSets([{reps:"",weight:""}]);setNote("");setCompletedSets([]);}}>Cancel</button>}
              </div>
            </div>

            {/* Today's logs */}
            {todayLogs.length===0 ? (
              <div style={{ textAlign:"center",color:"#333",padding:"44px 0",fontSize:13 }}>No entries yet — log your first set!</div>
            ) : todayLogs.map(log=>{
              const e    = exercises.find(x=>x.id===log.exerciseId);
              const maxW = log.sets.length ? Math.max(...log.sets.map(s=>+s.weight)) : 0;
              const vol  = log.sets.reduce((a,s)=>a+(+s.weight)*(+s.reps),0);
              const goal = getGoalForLog(log, activeProg, programs);
              const eval_ = evaluateSets(log.sets, goal);
              return (
                <div key={log.id} className="card" style={{
                  padding:"14px 16px",
                  border: eval_
                    ? (eval_.allDone ? "1px solid #276749" : "1px solid #742a2a")
                    : "1px solid #27272d",
                  background: eval_
                    ? (eval_.allDone ? "rgba(39,103,73,.08)" : "rgba(116,42,42,.08)")
                    : "#18181c",
                  transition:"border .3s, background .3s"
                }}>
                  <div style={{ display:"flex",alignItems:"center",gap:12,marginBottom:10 }}>
                    <div className="badge">{muscleEmoji(e?.muscle||"")}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:700,fontSize:15 }}>{e?.name||"Deleted exercise"}</div>
                      <div style={{ fontSize:11,color:"#555" }}>{e?.muscle}</div>
                    </div>
                    <div style={{ textAlign:"right",marginRight:4 }}>
                      <div className="num" style={{ fontSize:20,color:"#ff4e00" }}>{maxW}<span style={{ fontSize:11,color:"#555",marginLeft:2 }}>kg</span></div>
                      <div style={{ fontSize:10,color:"#444" }}>vol {vol.toLocaleString()}</div>
                    </div>
                    <button className="btn-line" onClick={()=>startEdit(log)} style={{ padding:"5px 10px",fontSize:11 }}>Edit</button>
                    <button className="btn-del" onClick={()=>deleteLog(log.id)}>✕</button>
                  </div>

                  {/* ── Goal target label (only when program active) ── */}
                  {goal && (
                    <div style={{ marginBottom:8,display:"flex",alignItems:"center",gap:8 }}>
                      <span style={{ fontSize:10,color:"#555",letterSpacing:.5 }}>TARGET</span>
                      <span style={{ fontSize:11,color:"#888",fontWeight:600 }}>
                        {goal.sets} sets × {goal.reps} reps{goal.weight>0?` @ ${goal.weight}kg`:""}
                      </span>
                    </div>
                  )}

                  {/* ── Set chips — green if met goal, red if not, neutral if no program ── */}
                  <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
                    {log.sets.map((s,i)=>{
                      const sr = eval_?.results?.[i];
                      const bg     = sr ? (sr.ok ? "rgba(56,161,105,.18)" : "rgba(197,48,48,.15)") : "#1e1e24";
                      const border = sr ? (sr.ok ? "1px solid #276749"    : "1px solid #742a2a"  ) : "1px solid transparent";
                      const numCol = sr ? (sr.ok ? "#68d391"               : "#fc8181"            ) : "#ff4e00";
                      return (
                        <div key={i} style={{ background:bg, border, borderRadius:7, padding:"5px 11px", fontSize:12, transition:"all .2s" }}>
                          <span className="num" style={{ color:numCol, marginRight:4 }}>{i+1}</span>
                          <span style={{ color:"#aaa" }}>{s.reps}×</span>
                          <span style={{ fontWeight:700 }}>{s.weight}kg</span>
                        </div>
                      );
                    })}
                  </div>
                  {log.note&&<div style={{ marginTop:8,fontSize:12,color:"#555",fontStyle:"italic" }}>📝 {log.note}</div>}
                </div>
              );
            })}
          </div>
        )}

        {/* ══════ TAB: History ══════ */}
        {tab==="history" && (
          <div className="fade" style={{ display:"flex",flexDirection:"column",gap:16 }}>
            {historyDates.length===0 ? (
              <div style={{ textAlign:"center",color:"#333",padding:"60px 0",fontSize:13 }}>No history yet</div>
            ) : historyDates.map(d=>{
              const dayLogs=logs.filter(l=>l.date===d);
              const dt=new Date(d+"T00:00:00");
              const totalVol=dayLogs.reduce((a,l)=>a+l.sets.reduce((b,s)=>b+(+s.weight)*(+s.reps),0),0);
              return (
                <div key={d} className="card" style={{ padding:18 }}>
                  <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}>
                    <div style={{ display:"flex",alignItems:"baseline",gap:10 }}>
                      <span className="num" style={{ fontSize:20 }}>{d}</span>
                      <span style={{ fontSize:12,color:"#555" }}>({DAYS[dt.getDay()]})</span>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <span className="chip">{dayLogs.length} exercises</span>
                      <div className="num" style={{ fontSize:13,color:"#666",marginTop:2 }}>{totalVol.toLocaleString()} kg</div>
                    </div>
                  </div>
                  <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
                    {dayLogs.map(log=>{
                      const e=exercises.find(x=>x.id===log.exerciseId);
                      const maxW=log.sets.length?Math.max(...log.sets.map(s=>+s.weight)):0;
                      return (
                        <div key={log.id} style={{ display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:"#1c1c22",borderRadius:8 }}>
                          <span style={{ fontSize:15 }}>{muscleEmoji(e?.muscle||"")}</span>
                          <span style={{ flex:1,fontWeight:600,fontSize:13 }}>{e?.name||"Deleted"}</span>
                          <span style={{ fontSize:12,color:"#888" }}>{log.sets.length} sets</span>
                          <span className="num" style={{ fontSize:15,color:"#ff4e00",minWidth:50,textAlign:"right" }}>{maxW}kg</span>
                          <button className="btn-line" onClick={()=>startEdit(log)} style={{ padding:"4px 8px",fontSize:11 }}>Edit</button>
                          <button className="btn-del" onClick={()=>deleteLog(log.id)}>✕</button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ══════ TAB: Stats ══════ */}
        {tab==="chart" && (
          <div className="fade" style={{ display:"flex",flexDirection:"column",gap:16 }}>
            <div style={{ display:"flex",gap:10 }}>
              <select className="ipt" value={chartEx} onChange={e=>setChartEx(e.target.value)} style={{ flex:1 }}>
                {exercises.map(e=><option key={e.id} value={e.id}>{muscleEmoji(e.muscle)} {e.name}</option>)}
              </select>
              <select className="ipt" value={metric} onChange={e=>setMetric(e.target.value)} style={{ flex:"0 0 130px" }}>
                <option value="weight">Max Weight</option>
                <option value="volume">Total Volume</option>
              </select>
            </div>
            {chartData.length<2 ? (
              <div style={{ textAlign:"center",color:"#333",padding:"60px 0",fontSize:13 }}>Need at least 2 data points</div>
            ) : (
              <>
                <div style={{ display:"flex",gap:10 }}>
                  {[
                    {label:"BEST",val:Math.max(...chartData.map(d=>d[metric==="weight"?"weight":"volume"])),unit:"kg"},
                    {label:"AVG",val:chartAvg,unit:"kg"},
                    {label:"SESSIONS",val:chartData.length,unit:"logged"},
                  ].map((s,i)=>(
                    <div key={i} style={{ flex:1,background:"#18181c",border:"1px solid #27272d",borderRadius:12,padding:"14px 16px",textAlign:"center" }}>
                      <div style={{ fontSize:9,letterSpacing:2,color:"#444",marginBottom:4 }}>{s.label}</div>
                      <div className="num" style={{ fontSize:28,color:i===0?"#ff4e00":"#f5f0e8",lineHeight:1 }}>{s.val.toLocaleString()}</div>
                      <div style={{ fontSize:10,color:"#555",marginTop:2 }}>{s.unit}</div>
                    </div>
                  ))}
                </div>
                <div className="card" style={{ padding:"20px 10px 10px" }}>
                  <div style={{ fontSize:10,letterSpacing:2,color:"#555",marginLeft:10,marginBottom:10,fontWeight:700 }}>
                    {metric==="weight"?"▸ MAX WEIGHT (kg)":"▸ TOTAL VOLUME (kg)"}
                  </div>
                  <ResponsiveContainer width="100%" height={220}>
                    <LineChart data={chartData} margin={{ top:5,right:20,bottom:5,left:0 }}>
                      <CartesianGrid strokeDasharray="2 4" stroke="#1e1e24"/>
                      <XAxis dataKey="date" tick={{ fill:"#555",fontSize:11 }} axisLine={false} tickLine={false}/>
                      <YAxis tick={{ fill:"#555",fontSize:11 }} axisLine={false} tickLine={false} width={40} domain={["auto","auto"]}/>
                      <Tooltip content={<ChartTooltip/>} cursor={{ stroke:"#333",strokeWidth:1 }}/>
                      <ReferenceLine y={chartAvg} stroke="#333" strokeDasharray="3 3"/>
                      <Line type="monotone" dataKey={metric==="weight"?"weight":"volume"} stroke="#ff4e00"
                        strokeWidth={2} dot={{ fill:"#ff4e00",r:3,strokeWidth:0 }} activeDot={{ r:5,fill:"#ff6e30",strokeWidth:0 }}/>
                    </LineChart>
                  </ResponsiveContainer>
                </div>
                <div className="card" style={{ padding:16 }}>
                  <div style={{ fontSize:10,letterSpacing:2,color:"#555",marginBottom:12,fontWeight:700 }}>▸ RECORD LOG</div>
                  {[...chartData].reverse().map((d,i)=>(
                    <div key={i} style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #1e1e24" }}>
                      <span style={{ fontSize:12,color:"#666" }}>{d.date}</span>
                      <div style={{ display:"flex",gap:20 }}>
                        <span style={{ fontSize:13 }}><span style={{ color:"#555",fontSize:11,marginRight:4 }}>MAX</span><span className="num" style={{ color:"#ff4e00" }}>{d.weight}kg</span></span>
                        <span style={{ fontSize:13 }}><span style={{ color:"#555",fontSize:11,marginRight:4 }}>VOL</span><span className="num">{d.volume.toLocaleString()}</span></span>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        )}

        {/* ══════ TAB: Program ══════ */}
        {tab==="program" && (
          <div className="fade">
            <div style={{ display:"flex",gap:8,marginBottom:20,flexWrap:"wrap" }}>
              {[["list","Programs"],["edit",editProg?"Editing":"New Program"],["progress","Progress"]].map(([k,v])=>(
                <button key={k} className={`prog-tab${progTab===k?" on":""}`}
                  onClick={()=>{ if(k==="edit"&&!editProg)startNewProgram(); else setProgTab(k); }}>{v}</button>
              ))}
            </div>

            {/* Programs list */}
            {progTab==="list" && (
              <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
                <button className="btn-og" onClick={startNewProgram} style={{ alignSelf:"flex-start" }}>+ New Program</button>
                {programs.length===0 ? (
                  <div style={{ textAlign:"center",color:"#333",padding:"48px 0",fontSize:13 }}>No programs yet</div>
                ) : programs.map(p=>{
                  const isActive=activeProg?.progId===p.id&&!activeProg?.done;
                  return (
                    <div key={p.id} className="card" style={{ padding:18,border:isActive?"1px solid #3a2a10":"1px solid #27272d" }}>
                      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12 }}>
                        <div>
                          <div style={{ fontWeight:700,fontSize:16,marginBottom:4 }}>{p.name}</div>
                          <div style={{ fontSize:12,color:"#666" }}>{p.sessions.length} sessions × {p.totalCycles} cycles = {p.sessions.length*p.totalCycles} total</div>
                        </div>
                        {isActive&&<span style={{ background:"rgba(255,140,0,.15)",color:"#ff8c00",padding:"3px 10px",borderRadius:999,fontSize:11,fontWeight:700 }}>Active</span>}
                      </div>
                      <div style={{ display:"flex",flexWrap:"wrap",gap:6,marginBottom:14 }}>
                        {p.sessions.map((s,i)=>(
                          <span key={i} style={{ background:"#1e1e24",borderRadius:6,padding:"3px 10px",fontSize:11,color:"#888" }}>{s.label}</span>
                        ))}
                      </div>
                      <div style={{ display:"flex",gap:8 }}>
                        {isActive ? (
                          <button className="btn-green" onClick={()=>setProgTab("progress")} style={{ flex:1 }}>▶ View Progress</button>
                        ) : (
                          <button className="btn-og" onClick={()=>startProgram(p)} style={{ flex:1 }}>▶ Start</button>
                        )}
                        <button className="btn-line" onClick={()=>{setEditProg(JSON.parse(JSON.stringify(p)));setProgTab("edit");}}>Edit</button>
                        <button className="btn-del" onClick={()=>deleteProgram(p.id)}>✕</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Edit program */}
            {progTab==="edit" && editProg && (
              <div style={{ display:"flex",flexDirection:"column",gap:16 }}>
                <div className="card" style={{ padding:18 }}>
                  <div style={{ fontSize:10,letterSpacing:2,color:"#555",fontWeight:700,marginBottom:12 }}>▸ PROGRAM SETTINGS</div>
                  <input className="ipt" placeholder="Program name (e.g. PPL Routine)" value={editProg.name}
                    onChange={e=>setEditProg(p=>({...p,name:e.target.value}))} style={{ marginBottom:10 }}/>
                  <div style={{ display:"flex",alignItems:"center",gap:12 }}>
                    <label style={{ fontSize:13,color:"#888",whiteSpace:"nowrap" }}>Cycle repeats</label>
                    <input className="ipt" type="number" min="1" max="52" value={editProg.totalCycles}
                      onChange={e=>setEditProg(p=>({...p,totalCycles:Math.max(1,+e.target.value)}))}
                      style={{ width:72 }}/>
                    <span style={{ fontSize:12,color:"#555",whiteSpace:"nowrap" }}>
                      × = <span style={{ color:"#ff4e00",fontWeight:700 }}>{editProg.sessions.length*editProg.totalCycles}</span> total sessions
                    </span>
                  </div>
                </div>

                <div style={{ fontSize:10,letterSpacing:2,color:"#555",fontWeight:700 }}>▸ SESSIONS ({editProg.sessions.length})</div>

                {editProg.sessions.map((session,sIdx)=>(
                  <div key={session.id} className="session-card">
                    <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:12 }}>
                      <span className="num" style={{ fontSize:22,color:"#ff4e00",minWidth:28 }}>{sIdx+1}</span>
                      <input className="ipt" value={session.label}
                        onChange={e=>updateSession(sIdx,"label",e.target.value)}
                        style={{ flex:1,fontWeight:700 }} placeholder="Session name (e.g. Push Day)"/>
                      <button className="btn-del" onClick={()=>removeSession(sIdx)}>✕</button>
                    </div>
                    <div style={{ display:"flex",flexDirection:"column",gap:6,marginBottom:10 }}>
                      {session.items.map((item,iIdx)=>{
                        const ex=exercises.find(x=>x.id===item.exId);
                        return (
                          <div key={item.id} style={{ display:"flex",alignItems:"center",gap:6,padding:"8px",background:"#13131a",borderRadius:8 }}>
                            <span style={{ fontSize:15,flexShrink:0 }}>{muscleEmoji(ex?.muscle||"")}</span>
                            <select className="ipt ipt-sm" value={item.exId}
                              onChange={e=>updateItem(sIdx,iIdx,"exId",e.target.value)} style={{ flex:3,minWidth:0 }}>
                              {exercises.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
                            </select>
                            <input className="ipt ipt-sm" type="number" placeholder="Sets" value={item.sets}
                              onChange={e=>updateItem(sIdx,iIdx,"sets",e.target.value)} style={{ flex:"0 0 50px" }}/>
                            <span style={{ fontSize:11,color:"#444",flexShrink:0 }}>sets</span>
                            <input className="ipt ipt-sm" type="number" placeholder="Reps" value={item.reps}
                              onChange={e=>updateItem(sIdx,iIdx,"reps",e.target.value)} style={{ flex:"0 0 50px" }}/>
                            <span style={{ fontSize:11,color:"#444",flexShrink:0 }}>reps</span>
                            <input className="ipt ipt-sm" type="number" placeholder="kg" value={item.weight}
                              onChange={e=>updateItem(sIdx,iIdx,"weight",e.target.value)} style={{ flex:"0 0 60px" }}/>
                            <span style={{ fontSize:11,color:"#444",flexShrink:0 }}>⏱</span>
                            <input className="ipt ipt-sm" type="number" placeholder="90" value={item.restTime??90}
                              onChange={e=>updateItem(sIdx,iIdx,"restTime",e.target.value)}
                              title="Rest time (seconds)" style={{ flex:"0 0 54px" }}/>
                            <span style={{ fontSize:11,color:"#444",flexShrink:0 }}>s</span>
                            <button className="btn-del" onClick={()=>removeItemFromSession(sIdx,iIdx)}>✕</button>
                          </div>
                        );
                      })}
                    </div>
                    <button className="btn-line" onClick={()=>addItemToSession(sIdx)} style={{ fontSize:12,width:"100%" }}>+ Add Exercise</button>
                  </div>
                ))}

                <button className="btn-line" onClick={addSession} style={{ fontSize:13 }}>+ Add Session</button>
                <div style={{ display:"flex",gap:8 }}>
                  <button className="btn-og" onClick={saveProgram} style={{ flex:1 }}>💾 Save Program</button>
                  <button className="btn-line" onClick={()=>{setEditProg(null);setProgTab("list");}}>Cancel</button>
                </div>
              </div>
            )}

            {/* Progress */}
            {progTab==="progress" && (
              <div style={{ display:"flex",flexDirection:"column",gap:16 }}>
                {!activeProgData ? (
                  <div style={{ textAlign:"center",color:"#333",padding:"60px 0",fontSize:13 }}>
                    No active program.<br/>
                    <span style={{ color:"#ff4e00",cursor:"pointer" }} onClick={()=>setProgTab("list")}>Start a program →</span>
                  </div>
                ) : activeProg?.done ? (
                  <div style={{ textAlign:"center",padding:"48px 20px" }}>
                    <div style={{ fontSize:56,marginBottom:16 }}>🏆</div>
                    <div style={{ fontFamily:"'Bebas Neue',cursive",fontSize:32,color:"#ff4e00",letterSpacing:2,marginBottom:8 }}>PROGRAM COMPLETE</div>
                    <div style={{ fontSize:14,color:"#888",marginBottom:24 }}>{activeProgData.name} — {activeProgData.totalCycles} cycles done!</div>
                    <button className="btn-og" onClick={()=>{setActiveProg(null);setProgTab("list");}}>Start New Program</button>
                  </div>
                ) : (
                  <>
                    {/* Progress card */}
                    <div className="card" style={{ padding:20 }}>
                      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16 }}>
                        <div>
                          <div style={{ fontSize:10,letterSpacing:2,color:"#ff8c00",fontWeight:700,marginBottom:4 }}>ACTIVE PROGRAM</div>
                          <div style={{ fontWeight:700,fontSize:18 }}>{activeProgData.name}</div>
                        </div>
                        <div style={{ textAlign:"right" }}>
                          <div className="num" style={{ fontSize:30,color:"#ff4e00",lineHeight:1 }}>
                            {activeProg.cycle}<span style={{ fontSize:14,color:"#555" }}>/{activeProgData.totalCycles}</span>
                          </div>
                          <div style={{ fontSize:10,color:"#555" }}>CYCLE</div>
                        </div>
                      </div>
                      <div className="progress-bar-bg" style={{ marginBottom:6 }}>
                        <div className="progress-bar-fill" style={{ width:`${(doneSessions/totalSessions)*100}%` }}/>
                      </div>
                      <div style={{ display:"flex",justifyContent:"space-between",fontSize:11,color:"#555" }}>
                        <span>Progress {Math.round((doneSessions/totalSessions)*100)}%</span>
                        <span>{doneSessions} / {totalSessions} sessions</span>
                      </div>
                    </div>

                    {/* Cycle map */}
                    {Array.from({length:activeProgData.totalCycles},(_,ci)=>(
                      <div key={ci} style={{ opacity:ci+1>activeProg.cycle?0.35:1,transition:"opacity .3s" }}>
                        <div style={{ fontSize:10,letterSpacing:2,color:ci+1===activeProg.cycle?"#ff4e00":"#444",fontWeight:700,marginBottom:8 }}>
                          ▸ CYCLE {ci+1}{ci+1===activeProg.cycle?" ← CURRENT":ci+1<activeProg.cycle?" ✓":""}
                        </div>
                        <div style={{ display:"flex",flexWrap:"wrap",gap:8 }}>
                          {activeProgData.sessions.map((s,si)=>{
                            const globalIdx=ci*activeProgData.sessions.length+si;
                            const isCurrent=ci+1===activeProg.cycle&&si===activeProg.sessionIdx;
                            const isDone=globalIdx<doneSessions;
                            return (
                              <div key={si} className="session-dot" style={{
                                background:isCurrent?"rgba(255,78,0,.15)":isDone?"#192a1a":"#1c1c22",
                                border:`1px solid ${isCurrent?"#ff4e00":isDone?"#2d6a2d":"#27272d"}`,
                                cursor:isCurrent?"pointer":"default"
                              }} onClick={isCurrent?applySessionToLog:undefined}>
                                <div style={{ fontSize:10,color:isDone?"#6fcf6f":isCurrent?"#ff4e00":"#555",fontWeight:700,marginBottom:4 }}>
                                  {isDone?"✓":isCurrent?"▶":pad2(si+1)}
                                </div>
                                <div style={{ fontSize:12,fontWeight:700,color:isCurrent?"#f5f0e8":"#888" }}>{s.label}</div>
                                <div style={{ fontSize:10,color:"#555",marginTop:2 }}>{s.items.length} exercises</div>
                                {isCurrent&&<div style={{ fontSize:10,color:"#ff4e00",marginTop:6,fontWeight:700 }}>Tap to log →</div>}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ))}

                    {/* Next session detail with goal achievement summary */}
                    {(()=>{
                      const session = activeProgData.sessions[activeProg.sessionIdx];
                      const today = todayStr();
                      // For each session item, find any logged entry for today
                      const sessionGoalResults = session?.items.map(it => {
                        const matchLog = logs.find(l => l.date===today && l.exerciseId===it.exId);
                        const goal = { sets:+it.sets||0, reps:+it.reps||0, weight:+it.weight||0 };
                        const ev = matchLog ? evaluateSets(matchLog.sets, goal) : null;
                        return { it, matchLog, goal, ev };
                      }) || [];
                      const loggedCount = sessionGoalResults.filter(r=>r.ev).length;
                      const achievedCount = sessionGoalResults.filter(r=>r.ev?.allDone).length;
                      const totalItems = sessionGoalResults.length;
                      const overallPct = totalItems > 0 ? Math.round((achievedCount/totalItems)*100) : 0;
                      return (
                        <div className="card" style={{ padding:18,border:"1px solid rgba(255,78,0,.25)" }}>
                          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}>
                            <div style={{ fontSize:10,letterSpacing:2,color:"#ff4e00",fontWeight:700 }}>
                              ▸ NEXT SESSION: {session?.label}
                            </div>
                            {loggedCount > 0 && (
                              <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                                <span style={{ fontSize:13 }}>{achievedCount===totalItems?"🏆":achievedCount>0?"⚡":"🔴"}</span>
                                <span style={{ fontSize:11,fontWeight:700,color:achievedCount===totalItems?"#6fcf6f":achievedCount>0?"#f6ad55":"#fc8181" }}>
                                  {achievedCount}/{totalItems} goals
                                </span>
                              </div>
                            )}
                          </div>

                          {/* Session overall progress bar */}
                          {loggedCount > 0 && (
                            <div style={{ marginBottom:14 }}>
                              <div style={{ background:"#1e1e26",borderRadius:999,height:6,overflow:"hidden",marginBottom:4 }}>
                                <div style={{
                                  width:`${overallPct}%`,height:"100%",borderRadius:999,
                                  background: overallPct===100
                                    ? "linear-gradient(90deg,#38a169,#68d391)"
                                    : "linear-gradient(90deg,#c05621,#f6ad55)",
                                  transition:"width .4s ease"
                                }}/>
                              </div>
                              <div style={{ fontSize:10,color:"#555",textAlign:"right" }}>Session completion {overallPct}%</div>
                            </div>
                          )}

                          {sessionGoalResults.map(({it,matchLog,goal,ev},i)=>{
                            const ex=exercises.find(x=>x.id===it.exId);
                            return (
                              <div key={i} style={{
                                display:"flex",alignItems:"center",gap:10,padding:"10px 0",
                                borderBottom:"1px solid #1e1e24"
                              }}>
                                <span style={{ fontSize:15 }}>{muscleEmoji(ex?.muscle||"")}</span>
                                <div style={{ flex:1 }}>
                                  <div style={{ fontSize:13,fontWeight:600,marginBottom:3 }}>{ex?.name||"Deleted exercise"}</div>
                                  <div style={{ fontSize:11,color:"#666",display:"flex",gap:10,flexWrap:"wrap" }}>
                                    <span>Target: {it.sets}×{it.reps}{it.weight?` @ ${it.weight}kg`:""}</span>
                                    {it.restTime&&<span style={{ color:"#555" }}>⏱ {it.restTime}s rest</span>}
                                  </div>
                                  {/* Per-exercise progress bar */}
                                  {ev && (
                                    <div style={{ marginTop:5 }}>
                                      <div style={{ background:"#1e1e26",borderRadius:999,height:4,overflow:"hidden",marginBottom:2 }}>
                                        <div style={{
                                          width:`${ev.pct}%`,height:"100%",borderRadius:999,
                                          background: ev.allDone
                                            ? "linear-gradient(90deg,#38a169,#68d391)"
                                            : "linear-gradient(90deg,#c53030,#fc8181)",
                                          transition:"width .4s ease"
                                        }}/>
                                      </div>
                                      <div style={{ display:"flex",flexWrap:"wrap",gap:4,marginTop:4 }}>
                                        {ev.results.map((r,ri)=>(
                                          <span key={ri} style={{
                                            fontSize:10,padding:"2px 7px",borderRadius:4,fontWeight:700,
                                            background: r.ok?"rgba(56,161,105,.15)":"rgba(197,48,48,.15)",
                                            color: r.ok?"#68d391":"#fc8181",
                                            border: `1px solid ${r.ok?"#2d6a2d":"#6a2d2d"}`
                                          }}>{ri+1} {r.ok?"✓":"✗"}</span>
                                        ))}
                                      </div>
                                    </div>
                                  )}
                                </div>
                                <div style={{ textAlign:"right",flexShrink:0 }}>
                                  {ev ? (
                                    <span style={{ fontSize:18 }}>{ev.allDone?"✅":"🔴"}</span>
                                  ) : (
                                    <span style={{ fontSize:12,color:"#444" }}>Not logged</span>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                          <button className="btn-og" onClick={applySessionToLog} style={{ width:"100%",marginTop:14 }}>
                            💾 Log Today & Move to Next Session
                          </button>
                        </div>
                      );
                    })()}

                    <button className="btn-del" onClick={()=>setActiveProg(null)}
                      style={{ alignSelf:"center",fontSize:12,color:"#555",border:"1px solid #222",padding:"6px 14px",borderRadius:6 }}>
                      Stop Program
                    </button>
                  </>
                )}
              </div>
            )}
          </div>
        )}

        {/* ══════ TAB: Exercises ══════ */}
        {tab==="manage" && (
          <div className="fade" style={{ display:"flex",flexDirection:"column",gap:16 }}>
            <div className="card" style={{ padding:20 }}>
              <div style={{ fontSize:10,letterSpacing:2,color:"#555",fontWeight:700,marginBottom:14 }}>▸ ADD NEW EXERCISE</div>
              <div style={{ display:"flex",gap:8,marginBottom:10 }}>
                <input className="ipt" style={{ flex:1 }} placeholder="Exercise name" value={newName} onChange={e=>setNewName(e.target.value)}/>
              </div>
              <input className="ipt" placeholder="Muscle group" value={newMuscle} onChange={e=>setNewMuscle(e.target.value)} style={{ marginBottom:12 }}/>
              <button className="btn-og" onClick={addExercise} style={{ width:"100%" }}>+ Add</button>
            </div>
            <div>
              <div style={{ fontSize:10,letterSpacing:2,color:"#555",fontWeight:700,marginBottom:12 }}>▸ EXERCISE LIST</div>
              <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
                {exercises.map(e=>(
                  <div key={e.id} className="card" style={{ padding:"12px 16px",display:"flex",alignItems:"center",gap:12 }}>
                    <div className="badge">{muscleEmoji(e.muscle)}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:700,fontSize:14 }}>{e.name}</div>
                      <div style={{ fontSize:11,color:"#555" }}>{e.muscle}</div>
                    </div>
                    <span style={{ fontSize:11,color:"#444" }}>{logs.filter(l=>l.exerciseId===e.id).length} logged</span>
                    <button className="btn-del" onClick={()=>deleteExercise(e.id)}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}
