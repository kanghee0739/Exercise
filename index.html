<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="LIFT.LOG"/>
  <meta name="theme-color" content="#111114"/>
  <title>LIFT.LOG</title>
  <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23111114'/><text y='130' x='20' font-size='110'>🏋️</text></svg>"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:#111114;color:#f5f0e8;font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;overscroll-behavior:none}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#ff4e00;border-radius:2px}
    input,select,textarea{outline:none;font-family:inherit;color-scheme:dark;font-size:16px}
    .num{font-weight:900;letter-spacing:1px}
    .ipt{width:100%;padding:10px 13px;background:#1c1c20;border:1px solid #2e2e36;border-radius:8px;color:#f5f0e8;font-size:15px;transition:border .15s}
    .ipt:focus{border-color:#ff4e00}
    .btn{padding:11px 22px;background:#ff4e00;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s;width:100%}
    .btn:active{opacity:.8}
    .btn-line{padding:9px 16px;background:transparent;border:1px solid #333;border-radius:8px;color:#888;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
    .btn-del{padding:6px 10px;background:transparent;border:1px solid transparent;border-radius:6px;color:#555;font-size:13px;cursor:pointer}
    .card{background:#18181c;border:1px solid #27272d;border-radius:14px;padding:16px}
    .tab-btn{padding:10px 4px;background:transparent;border:none;border-bottom:2px solid transparent;color:#555;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
    .tab-btn.on{color:#ff4e00;border-bottom-color:#ff4e00}
    .badge{width:40px;height:40px;border-radius:10px;background:#1e1e24;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .set-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #22222a}
    .set-row:last-child{border-bottom:none}
    .chip{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(255,78,0,.12);color:#ff4e00}
    .prog-bar-bg{background:#1e1e26;border-radius:999px;height:6px;overflow:hidden}
    .prog-bar-fill{background:linear-gradient(90deg,#ff4e00,#ff8c00);height:100%;border-radius:999px;transition:width .4s}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade{animation:fadeUp .22s ease}
    @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
    /* Timer modal */
    .timer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    .timer-box{background:#16161a;border:1px solid #2a2a32;border-radius:20px;padding:32px 36px;width:320px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.7)}
    /* Chart bars */
    .bar-wrap{display:flex;align-items:flex-end;gap:6px;height:140px;padding:10px 0}
    .bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
    .bar-fill{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(180deg,#ff6e30,#ff4e00);min-height:4px;transition:height .4s}
    .bar-label{font-size:9px;color:#555;text-align:center;white-space:nowrap;overflow:hidden;width:100%}
    .bar-val{font-size:10px;color:#ff8050;font-weight:700}
  </style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';

/* ═══════════════════════════════════════
   MUSCLE → EMOJI MAP
═══════════════════════════════════════ */
const MUSCLE_MAP = {
  chest:'🫁', back:'🔱', legs:'🦵', quads:'🦵', hamstrings:'🦵',
  glutes:'🦵', calves:'🦵', shoulders:'🙌', delts:'🙌', biceps:'💪',
  triceps:'🔻', core:'🔥', abs:'🔥', cardio:'🏃', 'full body':'⚡', other:'🏋️'
};
const MUSCLE_KW = [
  ['chest','🫁'],['back','🔱'],['leg','🦵'],['quad','🦵'],
  ['hamstring','🦵'],['glute','🦵'],['calf','🦵'],['shoulder','🙌'],
  ['delt','🙌'],['bicep','💪'],['tricep','🔻'],['core','🔥'],
  ['abs','🔥'],['cardio','🏃'],['full','⚡']
];
function muscleEmoji(m=''){
  const k=m.trim().toLowerCase();
  if(MUSCLE_MAP[k]) return MUSCLE_MAP[k];
  for(const [kw,em] of MUSCLE_KW) if(k.includes(kw)) return em;
  return '🏋️';
}

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
const uid=()=>Math.random().toString(36).slice(2,9);
const pad2=n=>String(n).padStart(2,'0');
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmtDate=s=>{const d=new Date(s+'T00:00:00');return`${d.getMonth()+1}/${d.getDate()}`};
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

/* ═══════════════════════════════════════
   INITIAL DATA
═══════════════════════════════════════ */
const INIT_EX=[
  {id:'bench',name:'Bench Press',muscle:'Chest'},
  {id:'squat',name:'Squat',muscle:'Legs'},
  {id:'dead',name:'Deadlift',muscle:'Back / Legs'},
  {id:'ohp',name:'Overhead Press',muscle:'Shoulders'},
  {id:'row',name:'Barbell Row',muscle:'Back'},
  {id:'pullup',name:'Pull-up',muscle:'Back / Biceps'},
  {id:'curl',name:'Barbell Curl',muscle:'Biceps'},
  {id:'dip',name:'Dips',muscle:'Triceps / Chest'},
].map(e=>({...e,emoji:muscleEmoji(e.muscle)}));

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let state={
  exercises:[...INIT_EX],
  logs:[],
  programs:[],
  activeProg:null,
  tab:'record',
  date:todayStr(),
  selEx:INIT_EX[0].id,
  sets:[{reps:'',weight:''}],
  completedSets:[],
  note:'',
  editId:null,
  restSec:90,
  showTimer:false,
  timerSec:90,
  showQuickAdd:false,
  qaName:'',qaMuscle:'',
  newName:'',newMuscle:'',
  chartEx:INIT_EX[0].id,
  metric:'weight',
  programs_tab:'list',
  editProg:null,
  toast:null,
};

/* ═══════════════════════════════════════
   PERSISTENCE
═══════════════════════════════════════ */
function loadState(){
  try{
    const d=JSON.parse(localStorage.getItem('liftlog_v2')||'null');
    if(d){
      if(d.exercises) state.exercises=d.exercises;
      if(d.logs)      state.logs=d.logs;
      if(d.programs)  state.programs=d.programs;
      if(d.activeProg!==undefined) state.activeProg=d.activeProg;
    }
  }catch(e){console.warn(e);}
}
function saveState(){
  try{
    localStorage.setItem('liftlog_v2',JSON.stringify({
      exercises:state.exercises,logs:state.logs,
      programs:state.programs,activeProg:state.activeProg
    }));
  }catch(e){console.warn(e);}
}
loadState();

/* ═══════════════════════════════════════
   RENDER ENGINE
═══════════════════════════════════════ */
let renderTimeout=null;
function render(){
  clearTimeout(renderTimeout);
  renderTimeout=setTimeout(()=>{
    document.getElementById('app').innerHTML=buildApp();
    bindEvents();
    saveState();
  },10);
}

function setState(updates){
  Object.assign(state,updates);
  render();
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
let toastTimer=null;
function showToast(msg,type='ok'){
  state.toast={msg,type};
  render();
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{state.toast=null;render();},2200);
}

/* ═══════════════════════════════════════
   GOAL HELPERS
═══════════════════════════════════════ */
function getGoal(log){
  const ap=state.activeProg;
  if(!ap||ap.done) return null;
  const prog=state.programs.find(p=>p.id===ap.progId);
  if(!prog) return null;
  const sess=prog.sessions[ap.sessionIdx];
  if(!sess) return null;
  const item=sess.items.find(it=>it.exId===log.exerciseId);
  if(!item) return null;
  return{sets:+item.sets||0,reps:+item.reps||0,weight:+item.weight||0};
}
function evalSets(actualSets,goal){
  if(!goal) return null;
  const results=actualSets.map(s=>({
    rOk:(+s.reps)>=goal.reps,
    wOk:goal.weight>0?(+s.weight)>=goal.weight:true,
    get ok(){return this.rOk&&this.wOk;}
  }));
  const done=results.filter(r=>r.ok).length;
  const pct=goal.sets>0?Math.min(100,Math.round(done/goal.sets*100)):0;
  return{results,done,total:goal.sets,pct,allDone:done>=goal.sets};
}

/* ═══════════════════════════════════════
   EXCEL EXPORT
═══════════════════════════════════════ */
function exportToExcel(){
  if(!state.logs.length){showToast('No logs to export!','err');return;}
  const rows=[['Date','Day','Exercise','Muscle Group','Set','Reps','Weight (kg)','Volume (kg)','Notes']];
  [...state.logs].sort((a,b)=>b.date.localeCompare(a.date)).forEach(log=>{
    const ex=state.exercises.find(x=>x.id===log.exerciseId);
    const d=new Date(log.date+'T00:00:00');
    log.sets.forEach((s,i)=>{
      rows.push([log.date,DAYS[d.getDay()],ex?.name||'Deleted',ex?.muscle||'',
        i+1,s.reps,s.weight,((+s.reps)*(+s.weight)).toFixed(1),i===0?(log.note||''):'']);
    });
  });
  const csv=rows.map(r=>r.map(c=>{
    const str=String(c??'');
    return str.includes(',')||str.includes('"')?'"'+str.replace(/"/g,'""')+'"':str;
  }).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`liftlog_${todayStr()}.csv`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('Downloaded! Open in Excel 📊');
}

/* ═══════════════════════════════════════
   TIMER STATE
═══════════════════════════════════════ */
let timerInterval=null;
let timerLeft=90;
let timerTotal=90;
let timerRunning=false;
let timerDone=false;

function startTimer(sec){
  clearInterval(timerInterval);
  timerTotal=sec;timerLeft=sec;timerDone=false;timerRunning=true;
  timerInterval=setInterval(()=>{
    timerLeft--;
    if(timerLeft<=0){clearInterval(timerInterval);timerRunning=false;timerDone=true;}
    renderTimerOnly();
  },1000);
  renderTimerOnly();
}
function toggleTimer(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;}
  else if(!timerDone){
    timerInterval=setInterval(()=>{
      timerLeft--;
      if(timerLeft<=0){clearInterval(timerInterval);timerRunning=false;timerDone=true;}
      renderTimerOnly();
    },1000);
    timerRunning=true;
  }
  renderTimerOnly();
}
function resetTimer(){
  clearInterval(timerInterval);timerLeft=timerTotal;timerRunning=false;timerDone=false;
  renderTimerOnly();
}
function renderTimerOnly(){
  const el=document.getElementById('timer-inner');
  if(!el) return;
  const pct=timerTotal>0?timerLeft/timerTotal*100:0;
  const r=54,circ=2*Math.PI*r,dash=circ*(1-pct/100);
  const strokeC=timerDone?'#48bb78':timerRunning?'#ff4e00':'#444';
  el.innerHTML=`
    <svg width="130" height="130" style="transform:rotate(-90deg)">
      <circle cx="65" cy="65" r="${r}" fill="none" stroke="#1e1e26" stroke-width="8"/>
      <circle cx="65" cy="65" r="${r}" fill="none" stroke="${strokeC}" stroke-width="8"
        stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${dash}"
        style="transition:stroke-dashoffset .9s linear,stroke .3s"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
      ${timerDone
        ? '<div style="font-size:32px">✅</div>'
        : `<div style="font-size:38px;font-weight:900;color:#f5f0e8">${pad2(Math.floor(timerLeft/60))}:${pad2(timerLeft%60)}</div>
           <div style="font-size:10px;color:#555;margin-top:2px">${timerTotal}s</div>`
      }
    </div>`;
  const doneEl=document.getElementById('timer-done-msg');
  if(doneEl) doneEl.style.display=timerDone?'block':'none';
  const toggleBtn=document.getElementById('timer-toggle');
  if(toggleBtn){
    toggleBtn.textContent=timerRunning?'⏸ Pause':timerDone?'🔄 Restart':'▶ Start';
    toggleBtn.style.background=timerRunning?'#1e1e26':'#ff4e00';
    toggleBtn.style.border=`1px solid ${timerRunning?'#333':'#ff4e00'}`;
  }
}

/* ═══════════════════════════════════════
   BUILD HTML
═══════════════════════════════════════ */
function buildApp(){
  const s=state;
  const todayLogs=s.logs.filter(l=>l.date===s.date);

  // Day stats
  let vol=0,topW=0;
  todayLogs.forEach(l=>l.sets.forEach(set=>{const w=+set.weight,r=+set.reps;vol+=w*r;if(w>topW)topW=w;}));

  const activeProgData=s.activeProg?s.programs.find(p=>p.id===s.activeProg.progId):null;
  const totalSess=activeProgData?activeProgData.sessions.length*activeProgData.totalCycles:0;
  const doneSess=s.activeProg?(s.activeProg.cycle-1)*(activeProgData?.sessions.length||0)+(s.activeProg.done?totalSess:s.activeProg.sessionIdx):0;

  return `
  ${s.toast?`<div style="position:fixed;top:20px;right:20px;z-index:9999;background:${s.toast.type==='err'?'#2a1414':'#1a2a1a'};border:1px solid ${s.toast.type==='err'?'#ff4e00':'#2d7a2d'};border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;color:${s.toast.type==='err'?'#ff6e50':'#6fcf6f'};animation:toastIn .2s ease;box-shadow:0 8px 24px rgba(0,0,0,.5)">${s.toast.msg}</div>`:''}

  ${s.showTimer?buildTimer():''}

  <div style="max-width:640px;margin:0 auto;padding:24px 16px 100px">

    <!-- HEADER -->
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px">
      <div>
        <div style="font-size:10px;letter-spacing:4px;color:#ff4e00;font-weight:700;margin-bottom:4px">WEIGHT TRAINING</div>
        <div style="font-size:44px;font-weight:900;letter-spacing:2px;line-height:1">LIFT<span style="color:#ff4e00">.</span>LOG</div>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end">
        <button onclick="exportToExcel()" class="btn-line" style="padding:10px 14px;font-size:13px">📊 Export</button>
        <button onclick="setState({showTimer:true})" class="btn-line" style="padding:10px 14px;font-size:13px">⏱ Rest</button>
        <div style="text-align:right">
          <div style="font-size:9px;color:#444;letter-spacing:1px">SESSIONS</div>
          <div class="num" style="font-size:36px;color:#ff4e00;line-height:1">${[...new Set(s.logs.map(l=>l.date))].length}</div>
        </div>
      </div>
    </div>

    <!-- ACTIVE PROGRAM BANNER -->
    ${activeProgData&&!s.activeProg?.done?`
    <div onclick="setState({tab:'program'})" style="background:linear-gradient(135deg,#1a1410,#201810);border:1px solid #3a2a10;border-radius:14px;padding:14px 18px;margin-bottom:18px;cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>
          <div style="font-size:10px;letter-spacing:2px;color:#ff8c00;font-weight:700;margin-bottom:2px">▸ IN PROGRESS</div>
          <div style="font-weight:700;font-size:14px">${activeProgData.name}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;color:#666">Cycle ${s.activeProg.cycle}/${activeProgData.totalCycles}</div>
          <div style="font-size:12px;color:#ff8c00;font-weight:700">${activeProgData.sessions[s.activeProg.sessionIdx]?.label||''}</div>
        </div>
      </div>
      <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${totalSess>0?Math.round(doneSess/totalSess*100):0}%"></div></div>
      <div style="font-size:10px;color:#555;margin-top:4px;text-align:right">${doneSess}/${totalSess} sessions</div>
    </div>`:''}

    <!-- TABS -->
    <div style="display:flex;gap:14px;border-bottom:1px solid #222;margin-bottom:22px;overflow-x:auto">
      ${[['record','Log'],['history','History'],['chart','Stats'],['program','Program'],['manage','Exercises']].map(([k,v])=>
        `<button class="tab-btn${s.tab===k?' on':''}" onclick="setState({tab:'${k}'})"> ${v}</button>`
      ).join('')}
    </div>

    <!-- TAB CONTENT -->
    <div class="fade">
    ${s.tab==='record'?buildRecordTab(todayLogs,vol,topW):''}
    ${s.tab==='history'?buildHistoryTab():''}
    ${s.tab==='chart'?buildChartTab():''}
    ${s.tab==='program'?buildProgramTab(doneSess,totalSess):''}
    ${s.tab==='manage'?buildManageTab():''}
    </div>

  </div>`;
}

/* ─── TIMER HTML ─── */
function buildTimer(){
  const PRESETS=[60,90,120,180,240,300];
  return `<div class="timer-overlay" onclick="if(event.target===this){clearInterval(timerInterval);timerRunning=false;setState({showTimer:false})}">
  <div class="timer-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
      <div style="font-size:10px;letter-spacing:3px;color:#ff4e00;font-weight:700">⏱ REST TIMER</div>
      <button onclick="clearInterval(timerInterval);timerRunning=false;setState({showTimer:false})" style="background:transparent;border:none;color:#555;cursor:pointer;font-size:20px">✕</button>
    </div>
    <div id="timer-inner" style="position:relative;width:130px;height:130px;margin:0 auto 20px"></div>
    <div id="timer-done-msg" style="color:#48bb78;font-weight:700;font-size:14px;margin-bottom:12px;display:none">Rest complete! 💪</div>
    <div style="display:flex;gap:6px;justify-content:center;margin-bottom:16px;flex-wrap:wrap">
      ${PRESETS.map(s=>`<button onclick="startTimer(${s});timerTotal=${s};renderTimerOnly()" style="padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;background:${timerTotal===s?'rgba(255,78,0,.15)':'#1e1e26'};border:1px solid ${timerTotal===s?'#ff4e00':'#2a2a32'};color:${timerTotal===s?'#ff4e00':'#888'}">${s>=60?Math.floor(s/60)+'m'+(s%60?s%60+'s':''):s+'s'}</button>`).join('')}
    </div>
    <div style="display:flex;gap:10px">
      <button id="timer-toggle" onclick="toggleTimer()" style="flex:2;padding:11px 0;border-radius:9px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;background:#ff4e00;border:1px solid #ff4e00">▶ Start</button>
      <button onclick="resetTimer()" style="flex:1;padding:11px 0;background:transparent;border:1px solid #2a2a32;border-radius:9px;color:#666;font-weight:700;cursor:pointer;font-family:inherit">Reset</button>
    </div>
  </div></div>`;
}

/* ─── RECORD TAB ─── */
function buildRecordTab(todayLogs,vol,topW){
  const s=state;
  const ex=s.exercises;
  return `
  <div style="display:flex;flex-direction:column;gap:14px">
    <!-- Date + stats -->
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <input type="date" class="ipt" value="${s.date}" id="inp-date" style="flex:1;min-width:140px" onchange="setState({date:this.value})"/>
      ${todayLogs.length?`<div style="display:flex;gap:8px">
        ${[['VOLUME',vol.toLocaleString(),'kg','#ff4e00'],['BEST',topW,'kg','#f5f0e8'],['LIFTS',todayLogs.length,'ex','#f5f0e8']].map(([l,v,u,c])=>`
        <div style="background:#1c1c20;border:1px solid #2e2e36;border-radius:8px;padding:6px 12px;text-align:center">
          <div style="font-size:9px;color:#555;letter-spacing:1px">${l}</div>
          <div class="num" style="font-size:18px;color:${c}">${v}</div>
          <div style="font-size:9px;color:#444">${u}</div>
        </div>`).join('')}
      </div>`:''}
    </div>

    <!-- Log form -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:10px;letter-spacing:2px;color:#555;font-weight:700">${s.editId?'▸ EDITING':'▸ NEW SET'}</div>
        <button onclick="timerTotal=${s.restSec};timerLeft=${s.restSec};timerRunning=false;timerDone=false;setState({showTimer:true});setTimeout(()=>startTimer(${s.restSec}),50)" style="padding:5px 12px;background:rgba(255,78,0,.1);border:1px solid rgba(255,78,0,.3);border-radius:6px;color:#ff8050;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">⏱ Rest Timer</button>
      </div>

      <!-- Exercise select -->
      <div style="display:flex;gap:8px;margin-bottom:${s.showQuickAdd?0:14}px">
        <select class="ipt" id="sel-ex" style="flex:1" onchange="setState({selEx:this.value})">
          ${ex.map(e=>`<option value="${e.id}" ${e.id===s.selEx?'selected':''}>${muscleEmoji(e.muscle)} ${e.name} (${e.muscle})</option>`).join('')}
        </select>
        <button onclick="setState({showQuickAdd:!state.showQuickAdd})" style="width:42px;background:${s.showQuickAdd?'rgba(255,78,0,.15)':'#1c1c20'};border:1px solid ${s.showQuickAdd?'#ff4e00':'#2e2e36'};border-radius:8px;color:${s.showQuickAdd?'#ff4e00':'#888'};font-size:22px;cursor:pointer;line-height:1">+</button>
      </div>

      <!-- Quick add -->
      ${s.showQuickAdd?`<div style="background:#13131a;border:1px solid rgba(255,78,0,.25);border-radius:10px;padding:14px;margin-bottom:14px;display:flex;flex-direction:column;gap:8px">
        <div style="font-size:10px;letter-spacing:2px;color:#ff4e00;font-weight:700">▸ ADD NEW EXERCISE</div>
        <input class="ipt" placeholder="Exercise name" id="qa-name" value="${s.qaName}" oninput="state.qaName=this.value" style="padding:9px 13px"/>
        <input class="ipt" placeholder="Muscle group (e.g. Chest)" id="qa-muscle" value="${s.qaMuscle}" oninput="state.qaMuscle=this.value" style="padding:9px 13px"/>
        <div style="display:flex;gap:8px">
          <button class="btn" onclick="quickAddEx()" style="flex:1;padding:9px">✨ Add & Select</button>
          <button class="btn-line" onclick="setState({showQuickAdd:false,qaName:'',qaMuscle:''})">Cancel</button>
        </div>
      </div>`:''}

      <!-- Sets -->
      <div style="margin-bottom:12px">
        <div style="display:flex;gap:8px;margin-bottom:6px;align-items:center">
          <div style="flex:0 0 28px;font-size:10px;color:#444;text-align:center">SET</div>
          <div style="flex:1;font-size:10px;color:#444">REPS</div>
          <div style="flex:1;font-size:10px;color:#444">WEIGHT (kg)</div>
          <div style="flex:0 0 58px;font-size:10px;color:#444;text-align:center">DONE</div>
          <div style="width:26px"></div>
        </div>
        ${s.sets.map((set,i)=>{
          const isDone=s.completedSets.includes(i);
          return `<div class="set-row" style="background:${isDone?'rgba(56,161,105,.08)':'transparent'};border-radius:${isDone?7:0}px">
            <div style="flex:0 0 28px;text-align:center;font-size:15px;font-weight:900;color:${isDone?'#68d391':'#ff4e00'}">${i+1}</div>
            <input type="number" class="ipt" value="${set.reps}" placeholder="12" style="flex:1;padding:7px 9px;opacity:${isDone?.6:1}" oninput="state.sets[${i}].reps=this.value"/>
            <input type="number" class="ipt" value="${set.weight}" placeholder="60" style="flex:1;padding:7px 9px;opacity:${isDone?.6:1}" oninput="state.sets[${i}].weight=this.value"/>
            <button onclick="${isDone?'':`markSetDone(${i})`}" style="flex:0 0 52px;padding:7px 0;border-radius:7px;font-weight:700;font-size:12px;cursor:${isDone?'default':'pointer'};font-family:inherit;background:${isDone?'rgba(56,161,105,.2)':'rgba(255,78,0,.1)'};border:1px solid ${isDone?'#276749':'rgba(255,78,0,.4)'};color:${isDone?'#68d391':'#ff8050'}">${isDone?'✓':'Done'}</button>
            <button class="btn-del" onclick="removeSet(${i})" ${s.sets.length===1?'disabled':''}>✕</button>
          </div>`;
        }).join('')}
      </div>

      <!-- Rest time -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 14px;background:#13131a;border:1px solid #22222a;border-radius:9px;flex-wrap:wrap">
        <span style="font-size:12px;color:#666;font-weight:600;white-space:nowrap">⏱ Rest</span>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${[60,90,120,180,240,300].map(sec=>`<button onclick="setState({restSec:${sec}})" style="padding:4px 9px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;background:${s.restSec===sec?'rgba(255,78,0,.15)':'#1c1c22'};border:1px solid ${s.restSec===sec?'#ff4e00':'#2a2a32'};color:${s.restSec===sec?'#ff4e00':'#666'}">${sec>=60?Math.floor(sec/60)+'m'+(sec%60?sec%60+'s':''):sec+'s'}</button>`).join('')}
        </div>
        <div style="display:flex;align-items:center;gap:5px">
          <input type="number" value="${s.restSec}" style="width:52px;padding:4px 7px;background:#1c1c22;border:1px solid #2a2a32;border-radius:6px;color:#f5f0e8;font-size:13px;text-align:center" oninput="setState({restSec:Math.max(10,+this.value)})"/>
          <span style="font-size:11px;color:#555">sec</span>
        </div>
      </div>

      <button class="btn-line" onclick="state.sets.push({reps:'',weight:''});render()" style="width:100%;margin-bottom:12px">+ Add Set</button>
      <input class="ipt" placeholder="Notes (optional)" value="${s.note||''}" oninput="state.note=this.value" style="margin-bottom:14px"/>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="saveLog()" style="flex:1">${s.editId?'✏️  Save Changes':'💾  Save'}</button>
        ${s.editId?`<button class="btn-line" onclick="setState({editId:null,sets:[{reps:'',weight:''}],note:'',completedSets:[]})">Cancel</button>`:''}
      </div>
    </div>

    <!-- Today's logs -->
    ${todayLogs.length===0?`<div style="text-align:center;color:#333;padding:44px 0;font-size:13px">No entries yet — log your first set!</div>`
    :todayLogs.map(log=>{
      const e=state.exercises.find(x=>x.id===log.exerciseId);
      const maxW=log.sets.length?Math.max(...log.sets.map(s=>+s.weight)):0;
      const vol2=log.sets.reduce((a,s)=>a+(+s.weight)*(+s.reps),0);
      const goal=getGoal(log);
      const ev=evalSets(log.sets,goal);
      const borderC=ev?(ev.allDone?'#276749':'#742a2a'):'#27272d';
      const bgC=ev?(ev.allDone?'rgba(39,103,73,.08)':'rgba(116,42,42,.08)'):'#18181c';
      return `<div style="background:${bgC};border:1px solid ${borderC};border-radius:14px;padding:14px 16px;transition:all .3s">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <div class="badge">${muscleEmoji(e?.muscle||'')}</div>
          <div style="flex:1">
            <div style="font-weight:700;font-size:15px">${e?.name||'Deleted exercise'}</div>
            <div style="font-size:11px;color:#555">${e?.muscle||''}</div>
          </div>
          <div style="text-align:right;margin-right:6px">
            <div class="num" style="font-size:20px;color:#ff4e00">${maxW}<span style="font-size:11px;color:#555;margin-left:2px">kg</span></div>
            <div style="font-size:10px;color:#444">vol ${vol2.toLocaleString()}</div>
          </div>
          <button class="btn-line" onclick="startEdit('${log.id}')" style="padding:5px 10px;font-size:11px">Edit</button>
          <button class="btn-del" onclick="deleteLog('${log.id}')">✕</button>
        </div>
        ${goal?`<div style="margin-bottom:8px;display:flex;align-items:center;gap:8px">
          <span style="font-size:10px;color:#555">TARGET</span>
          <span style="font-size:11px;color:#888;font-weight:600">${goal.sets} sets × ${goal.reps} reps${goal.weight>0?` @ ${goal.weight}kg`:''}</span>
        </div>`:''}
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${log.sets.map((set,i)=>{
            const sr=ev?.results?.[i];
            const bg=sr?(sr.ok?'rgba(56,161,105,.18)':'rgba(197,48,48,.15)'):'#1e1e24';
            const bdr=sr?(sr.ok?'1px solid #276749':'1px solid #742a2a'):'1px solid transparent';
            const nc=sr?(sr.ok?'#68d391':'#fc8181'):'#ff4e00';
            return `<div style="background:${bg};border:${bdr};border-radius:7px;padding:5px 11px;font-size:12px">
              <span class="num" style="color:${nc};margin-right:4px">${i+1}</span>
              <span style="color:#aaa">${set.reps}×</span>
              <span style="font-weight:700">${set.weight}kg</span>
            </div>`;
          }).join('')}
        </div>
        ${log.note?`<div style="margin-top:8px;font-size:12px;color:#555;font-style:italic">📝 ${log.note}</div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

/* ─── HISTORY TAB ─── */
function buildHistoryTab(){
  const dates=[...new Set(state.logs.map(l=>l.date))].sort((a,b)=>b.localeCompare(a));
  if(!dates.length) return `<div style="text-align:center;color:#333;padding:60px 0;font-size:13px">No history yet</div>`;
  return dates.map(d=>{
    const dayLogs=state.logs.filter(l=>l.date===d);
    const dt=new Date(d+'T00:00:00');
    const totalVol=dayLogs.reduce((a,l)=>a+l.sets.reduce((b,s)=>b+(+s.weight)*(+s.reps),0),0);
    return `<div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="display:flex;align-items:baseline;gap:10px">
          <span class="num" style="font-size:18px">${d}</span>
          <span style="font-size:12px;color:#555">(${DAYS[dt.getDay()]})</span>
        </div>
        <div style="text-align:right">
          <span class="chip">${dayLogs.length} exercises</span>
          <div class="num" style="font-size:12px;color:#666;margin-top:2px">${totalVol.toLocaleString()} kg</div>
        </div>
      </div>
      ${dayLogs.map(log=>{
        const e=state.exercises.find(x=>x.id===log.exerciseId);
        const maxW=log.sets.length?Math.max(...log.sets.map(s=>+s.weight)):0;
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:#1c1c22;border-radius:8px;margin-bottom:6px">
          <span style="font-size:16px">${muscleEmoji(e?.muscle||'')}</span>
          <span style="flex:1;font-weight:600;font-size:13px">${e?.name||'Deleted'}</span>
          <span style="font-size:12px;color:#888">${log.sets.length} sets</span>
          <span class="num" style="font-size:15px;color:#ff4e00">${maxW}kg</span>
          <button class="btn-line" onclick="startEdit('${log.id}')" style="padding:4px 8px;font-size:11px">Edit</button>
          <button class="btn-del" onclick="deleteLog('${log.id}')">✕</button>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

/* ─── CHART TAB ─── */
function buildChartTab(){
  const s=state;
  const data=s.logs.filter(l=>l.exerciseId===s.chartEx)
    .sort((a,b)=>a.date.localeCompare(b.date))
    .map(l=>{
      const maxW=Math.max(...l.sets.map(x=>+x.weight).filter(Boolean),0);
      const vol=l.sets.reduce((a,x)=>a+(+x.weight)*(+x.reps),0);
      return{date:fmtDate(l.date),weight:maxW,volume:vol};
    });
  const metric=s.metric;
  const vals=data.map(d=>metric==='weight'?d.weight:d.volume);
  const maxVal=vals.length?Math.max(...vals):1;
  const avg=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
  const best=vals.length?Math.max(...vals):0;

  return `<div style="display:flex;flex-direction:column;gap:14px">
    <div style="display:flex;gap:10px">
      <select class="ipt" style="flex:1" onchange="setState({chartEx:this.value})">
        ${s.exercises.map(e=>`<option value="${e.id}" ${e.id===s.chartEx?'selected':''}>${muscleEmoji(e.muscle)} ${e.name}</option>`).join('')}
      </select>
      <select class="ipt" style="flex:0 0 130px" onchange="setState({metric:this.value})">
        <option value="weight" ${metric==='weight'?'selected':''}>Max Weight</option>
        <option value="volume" ${metric==='volume'?'selected':''}>Total Volume</option>
      </select>
    </div>
    ${data.length<2?`<div style="text-align:center;color:#333;padding:60px 0;font-size:13px">Need at least 2 sessions</div>`:`
    <div style="display:flex;gap:10px">
      ${[['BEST',best.toLocaleString(),'kg','#ff4e00'],['AVG',avg.toLocaleString(),'kg','#f5f0e8'],['SESSIONS',data.length,'logged','#f5f0e8']].map(([l,v,u,c])=>`
      <div style="flex:1;background:#18181c;border:1px solid #27272d;border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:9px;letter-spacing:2px;color:#444;margin-bottom:4px">${l}</div>
        <div class="num" style="font-size:26px;color:${c};line-height:1">${v}</div>
        <div style="font-size:10px;color:#555;margin-top:2px">${u}</div>
      </div>`).join('')}
    </div>
    <div class="card" style="padding:16px">
      <div style="font-size:10px;letter-spacing:2px;color:#555;margin-bottom:12px;font-weight:700">${metric==='weight'?'▸ MAX WEIGHT (kg)':'▸ TOTAL VOLUME (kg)'}</div>
      <div class="bar-wrap">
        ${data.slice(-12).map(d=>{
          const val=metric==='weight'?d.weight:d.volume;
          const h=maxVal>0?Math.round((val/maxVal)*120):4;
          return `<div class="bar-col">
            <div class="bar-val">${val>999?(val/1000).toFixed(1)+'k':val}</div>
            <div class="bar-fill" style="height:${h}px"></div>
            <div class="bar-label">${d.date}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="card" style="padding:16px">
      <div style="font-size:10px;letter-spacing:2px;color:#555;margin-bottom:12px;font-weight:700">▸ RECORD LOG</div>
      ${[...data].reverse().slice(0,10).map(d=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1e1e24">
        <span style="font-size:12px;color:#666">${d.date}</span>
        <div style="display:flex;gap:16px">
          <span style="font-size:13px"><span style="color:#555;font-size:11px;margin-right:4px">MAX</span><span class="num" style="color:#ff4e00">${d.weight}kg</span></span>
          <span style="font-size:13px"><span style="color:#555;font-size:11px;margin-right:4px">VOL</span><span class="num">${d.volume.toLocaleString()}</span></span>
        </div>
      </div>`).join('')}
    </div>`}
  </div>`;
}

/* ─── PROGRAM TAB ─── */
function buildProgramTab(doneSess,totalSess){
  const s=state;
  const pt=s.programs_tab;
  return `<div>
    <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">
      ${[['list','Programs'],['edit',s.editProg?'Editing':'New Program'],['progress','Progress']].map(([k,v])=>`
      <button onclick="${k==='edit'&&!s.editProg?'startNewProgram()':'setState({programs_tab:\''+k+'\'})'}" style="padding:7px 14px;background:${pt===k?'rgba(255,78,0,.12)':'transparent'};border:1px solid ${pt===k?'#ff4e00':'#27272d'};border-radius:7px;color:${pt===k?'#ff4e00':'#666'};font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">${v}</button>
      `).join('')}
    </div>
    ${pt==='list'?buildProgList():pt==='edit'&&s.editProg?buildProgEdit():buildProgProgress(doneSess,totalSess)}

}

function buildProgList(){
  const s=state;
  return `<div style="display:flex;flex-direction:column;gap:12px">
    <button class="btn" onclick="startNewProgram()" style="align-self:flex-start;width:auto;padding:10px 20px">+ New Program</button>
    ${!s.programs.length?`<div style="text-align:center;color:#333;padding:48px 0;font-size:13px">No programs yet</div>`
    :s.programs.map(p=>{
      const isActive=s.activeProg?.progId===p.id&&!s.activeProg?.done;
      return `<div class="card" style="border:1px solid ${isActive?'#3a2a10':'#27272d'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div>
            <div style="font-weight:700;font-size:16px;margin-bottom:4px">${p.name}</div>
            <div style="font-size:12px;color:#666">${p.sessions.length} sessions × ${p.totalCycles} cycles = ${p.sessions.length*p.totalCycles} total</div>
          </div>
          ${isActive?`<span style="background:rgba(255,140,0,.15);color:#ff8c00;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700">Active</span>`:''}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
          ${p.sessions.map(s=>`<span style="background:#1e1e24;border-radius:6px;padding:3px 10px;font-size:11px;color:#888">${s.label}</span>`).join('')}
        </div>
        <div style="display:flex;gap:8px">
          ${isActive
            ?`<button class="btn" onclick="setState({programs_tab:'progress'})" style="flex:1;padding:9px">▶ View Progress</button>`
            :`<button class="btn" onclick="startProg('${p.id}')" style="flex:1;padding:9px">▶ Start</button>`}
          <button class="btn-line" onclick="editProg('${p.id}')">Edit</button>
          <button class="btn-del" onclick="deleteProg('${p.id}')">✕</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function buildProgEdit(){
  const s=state;const p=s.editProg;
  return `<div style="display:flex;flex-direction:column;gap:14px">
    <div class="card">
      <div style="font-size:10px;letter-spacing:2px;color:#555;font-weight:700;margin-bottom:12px">▸ PROGRAM SETTINGS</div>
      <input class="ipt" placeholder="Program name (e.g. PPL Routine)" value="${p.name||''}" oninput="state.editProg.name=this.value" style="margin-bottom:10px"/>
      <div style="display:flex;align-items:center;gap:12px">
        <label style="font-size:13px;color:#888;white-space:nowrap">Cycle repeats</label>
        <input type="number" class="ipt" min="1" max="52" value="${p.totalCycles}" style="width:70px" oninput="state.editProg.totalCycles=Math.max(1,+this.value);render()"/>
        <span style="font-size:12px;color:#555;white-space:nowrap">× = <span style="color:#ff4e00;font-weight:700">${p.sessions.length*p.totalCycles}</span> total</span>

    </div>
    <div style="font-size:10px;letter-spacing:2px;color:#555;font-weight:700">▸ SESSIONS (${p.sessions.length})</div>
    ${p.sessions.map((sess,si)=>`
    <div style="background:#1a1a1e;border:1px solid #27272d;border-radius:12px;padding:16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span class="num" style="font-size:22px;color:#ff4e00;min-width:28px">${si+1}</span>
        <input class="ipt" value="${sess.label}" placeholder="Session name" oninput="state.editProg.sessions[${si}].label=this.value" style="flex:1;font-weight:700"/>
        <button class="btn-del" onclick="removeSession(${si})">✕</button>
      </div>
      ${sess.items.map((item,ii)=>{
        const ex=state.exercises.find(x=>x.id===item.exId);
        return `<div style="display:flex;align-items:center;gap:6px;padding:8px;background:#13131a;border-radius:8px;margin-bottom:6px;flex-wrap:wrap">
          <span style="font-size:15px">${muscleEmoji(ex?.muscle||'')}</span>
          <select class="ipt" style="flex:3;min-width:0;padding:6px 8px" onchange="state.editProg.sessions[${si}].items[${ii}].exId=this.value">
            ${state.exercises.map(e=>`<option value="${e.id}" ${e.id===item.exId?'selected':''}>${e.name}</option>`).join('')}
          </select>
          <input type="number" class="ipt" placeholder="Sets" value="${item.sets}" style="flex:0 0 50px;padding:6px 8px" oninput="state.editProg.sessions[${si}].items[${ii}].sets=this.value"/>
          <span style="font-size:11px;color:#444">sets</span>
          <input type="number" class="ipt" placeholder="Reps" value="${item.reps}" style="flex:0 0 50px;padding:6px 8px" oninput="state.editProg.sessions[${si}].items[${ii}].reps=this.value"/>
          <span style="font-size:11px;color:#444">reps</span>
          <input type="number" class="ipt" placeholder="kg" value="${item.weight||''}" style="flex:0 0 58px;padding:6px 8px" oninput="state.editProg.sessions[${si}].items[${ii}].weight=this.value"/>
          <span style="font-size:11px;color:#444">⏱</span>
          <input type="number" class="ipt" placeholder="90" value="${item.restTime||90}" style="flex:0 0 54px;padding:6px 8px" oninput="state.editProg.sessions[${si}].items[${ii}].restTime=this.value"/>
          <span style="font-size:11px;color:#444">s</span>
          <button class="btn-del" onclick="removeItemFromSession(${si},${ii})">✕</button>
        </div>`;
      }).join('')}
      <button class="btn-line" onclick="addItemToSession(${si})" style="width:100%;font-size:12px">+ Add Exercise</button>
    </div>`).join('')}
    <button class="btn-line" onclick="addSession()" style="font-size:13px">+ Add Session</button>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="saveProgram()" style="flex:1">💾 Save Program</button>
      <button class="btn-line" onclick="setState({editProg:null,programs_tab:'list'})">Cancel</button>
    </div>
  </div>`;
}

function buildProgProgress(doneSess,totalSess){
  const s=state;
  const ap=s.activeProg;
  const prog=s.programs.find(p=>p.id===ap?.progId);
  if(!prog) return `<div style="text-align:center;color:#333;padding:60px 0;font-size:13px">No active program.<br/><span style="color:#ff4e00;cursor:pointer" onclick="setState({programs_tab:'list'})">Start a program →</span></div>`;
  if(ap.done) return `<div style="text-align:center;padding:48px 20px">
    <div style="font-size:56px;margin-bottom:16px">🏆</div>
    <div style="font-size:32px;font-weight:900;color:#ff4e00;letter-spacing:2px;margin-bottom:8px">PROGRAM COMPLETE</div>
    <div style="font-size:14px;color:#888;margin-bottom:24px">${prog.name} — ${prog.totalCycles} cycles done!</div>
    <button class="btn" onclick="setState({activeProg:null,programs_tab:'list'})" style="width:auto;padding:12px 24px">Start New Program</button>
  </div>`;

  const pct=totalSess>0?Math.round(doneSess/totalSess*100):0;
  return `<div style="display:flex;flex-direction:column;gap:14px">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <div>
          <div style="font-size:10px;letter-spacing:2px;color:#ff8c00;font-weight:700;margin-bottom:4px">ACTIVE PROGRAM</div>
          <div style="font-weight:700;font-size:18px">${prog.name}</div>
        </div>
        <div style="text-align:right">
          <div class="num" style="font-size:30px;color:#ff4e00;line-height:1">${ap.cycle}<span style="font-size:14px;color:#555">/${prog.totalCycles}</span></div>
          <div style="font-size:10px;color:#555">CYCLE</div>
        </div>
      </div>
      <div class="prog-bar-bg" style="margin-bottom:6px"><div class="prog-bar-fill" style="width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#555">
        <span>Progress ${pct}%</span>
        <span>${doneSess} / ${totalSess} sessions</span>
      </div>
    </div>

    ${Array.from({length:prog.totalCycles},(_,ci)=>`
    <div style="opacity:${ci+1>ap.cycle?.35:1};transition:opacity .3s">
      <div style="font-size:10px;letter-spacing:2px;color:${ci+1===ap.cycle?'#ff4e00':'#444'};font-weight:700;margin-bottom:8px">
        ▸ CYCLE ${ci+1}${ci+1===ap.cycle?' ← CURRENT':ci+1<ap.cycle?' ✓':''}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${prog.sessions.map((sess,si)=>{
          const gIdx=ci*prog.sessions.length+si;
          const isCur=ci+1===ap.cycle&&si===ap.sessionIdx;
          const isDone=gIdx<doneSess;
          return `<div onclick="${isCur?'applySession()':''}" style="flex:1 0 calc(33% - 8px);min-width:88px;padding:10px 12px;border-radius:10px;text-align:center;cursor:${isCur?'pointer':'default'};background:${isCur?'rgba(255,78,0,.15)':isDone?'#192a1a':'#1c1c22'};border:1px solid ${isCur?'#ff4e00':isDone?'#2d6a2d':'#27272d'};transition:all .2s">
            <div style="font-size:10px;color:${isDone?'#6fcf6f':isCur?'#ff4e00':'#555'};font-weight:700;margin-bottom:4px">${isDone?'✓':isCur?'▶':pad2(si+1)}</div>
            <div style="font-size:12px;font-weight:700;color:${isCur?'#f5f0e8':'#888'}">${sess.label}</div>
            <div style="font-size:10px;color:#555;margin-top:2px">${sess.items.length} exercises</div>
            ${isCur?`<div style="font-size:10px;color:#ff4e00;margin-top:6px;font-weight:700">Tap to log →</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`).join('')}

    <!-- Next session detail -->
    <div class="card" style="border:1px solid rgba(255,78,0,.25)">
      <div style="font-size:10px;letter-spacing:2px;color:#ff4e00;font-weight:700;margin-bottom:12px">▸ NEXT SESSION: ${prog.sessions[ap.sessionIdx]?.label||''}</div>
      ${(prog.sessions[ap.sessionIdx]?.items||[]).map(it=>{
        const ex=state.exercises.find(x=>x.id===it.exId);
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e1e24">
          <span style="font-size:15px">${muscleEmoji(ex?.muscle||'')}</span>
          <span style="flex:1;font-size:13px;font-weight:600">${ex?.name||'Deleted'}</span>
          <span style="font-size:12px;color:#888">${it.sets}×${it.reps}</span>
          ${it.weight?`<span class="num" style="font-size:14px;color:#ff4e00">${it.weight}kg</span>`:''}
          ${it.restTime?`<span style="font-size:11px;color:#555">⏱${it.restTime}s</span>`:''}
        </div>`;
      }).join('')}
      <button class="btn" onclick="applySession()" style="margin-top:14px">💾 Log Today & Move to Next Session</button>
    </div>
    <button class="btn-del" onclick="setState({activeProg:null})" style="align-self:center;font-size:12px;color:#555;border:1px solid #222;padding:6px 14px;border-radius:6px">Stop Program</button>
  </div>`;
}

/* ─── MANAGE TAB ─── */
function buildManageTab(){
  const s=state;
  return `<div style="display:flex;flex-direction:column;gap:14px">
    <div class="card">
      <div style="font-size:10px;letter-spacing:2px;color:#555;font-weight:700;margin-bottom:14px">▸ ADD NEW EXERCISE</div>
      <input class="ipt" placeholder="Exercise name" id="new-name" value="${s.newName||''}" oninput="state.newName=this.value" style="margin-bottom:10px"/>
      <input class="ipt" placeholder="Muscle group (e.g. Chest, Back, Legs)" id="new-muscle" value="${s.newMuscle||''}" oninput="state.newMuscle=this.value" style="margin-bottom:12px"/>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <span style="font-size:28px">${muscleEmoji(s.newMuscle||'')}</span>
        <span style="font-size:12px;color:#555">Icon auto-set from muscle group</span>
      </div>
      <button class="btn" onclick="addExercise()">+ Add</button>
    </div>
    <div>
      <div style="font-size:10px;letter-spacing:2px;color:#555;font-weight:700;margin-bottom:12px">▸ EXERCISE LIST</div>
      ${s.exercises.map(e=>`
      <div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;padding:12px 16px">
        <div class="badge">${muscleEmoji(e.muscle)}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:14px">${e.name}</div>
          <div style="font-size:11px;color:#555">${e.muscle}</div>
        </div>
        <span style="font-size:11px;color:#444">${s.logs.filter(l=>l.exerciseId===e.id).length} logged</span>
        <button class="btn-del" onclick="deleteExercise('${e.id}')">✕</button>
      </div>`).join('')}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════
   ACTIONS
═══════════════════════════════════════ */
function saveLog(){
  const s=state;
  const validSets=s.sets.filter(x=>x.reps&&x.weight);
  if(!validSets.length){showToast('Fill in reps & weight!','err');return;}
  if(s.editId){
    state.logs=state.logs.map(l=>l.id===s.editId?{...l,exerciseId:s.selEx,date:s.date,sets:validSets,note:s.note}:l);
    showToast('Updated ✏️');
  }else{
    state.logs.push({id:uid(),exerciseId:s.selEx,date:s.date,sets:validSets,note:s.note||''});
    showToast('Saved! 💪');
  }
  setState({sets:[{reps:'',weight:''}],note:'',editId:null,completedSets:[]});
}
function deleteLog(id){state.logs=state.logs.filter(l=>l.id!==id);showToast('Deleted');render();}
function startEdit(id){
  const log=state.logs.find(l=>l.id===id);
  if(!log) return;
  setState({selEx:log.exerciseId,sets:log.sets.map(s=>({...s})),note:log.note||'',editId:id,date:log.date,tab:'record',completedSets:[]});
}
function markSetDone(i){
  if(!state.sets[i].reps||!state.sets[i].weight){showToast('Fill in reps & weight first!','err');return;}
  if(!state.completedSets.includes(i)) state.completedSets.push(i);
  if(i===state.sets.length-1) state.sets.push({reps:'',weight:''});
  timerTotal=state.restSec;timerLeft=state.restSec;timerRunning=false;timerDone=false;
  state.showTimer=true;
  render();
  setTimeout(()=>startTimer(state.restSec),80);
}
function removeSet(i){
  state.sets.splice(i,1);
  state.completedSets=state.completedSets.filter(x=>x!==i).map(x=>x>i?x-1:x);
  render();
}
function addExercise(){
  const m=state.newMuscle.trim()||'Other';
  if(!state.newName.trim()){showToast('Enter a name!','err');return;}
  state.exercises.push({id:uid(),name:state.newName.trim(),muscle:m,emoji:muscleEmoji(m)});
  setState({newName:'',newMuscle:''});
  showToast('Exercise added ✨');
}
function quickAddEx(){
  const m=state.qaMuscle.trim()||'Other';
  if(!state.qaName.trim()){showToast('Enter a name!','err');return;}
  const newEx={id:uid(),name:state.qaName.trim(),muscle:m,emoji:muscleEmoji(m)};
  state.exercises.push(newEx);
  setState({selEx:newEx.id,qaName:'',qaMuscle:'',showQuickAdd:false});
  showToast(`'${newEx.name}' added ✨`);
}
function deleteExercise(id){
  state.exercises=state.exercises.filter(x=>x.id!==id);
  state.logs=state.logs.filter(x=>x.exerciseId!==id);
  showToast('Deleted');render();
}

/* ── Program actions ── */
function startNewProgram(){
  const sessions=Array.from({length:6},(_,i)=>({
    id:uid(),label:`Day ${i+1}`,
    items:[{id:uid(),exId:INIT_EX[0].id,sets:'3',reps:'10',weight:'',restTime:'90'}]
  }));
  setState({editProg:{id:uid(),name:'',totalCycles:3,sessions},programs_tab:'edit'});
}
function saveProgram(){
  if(!state.editProg.name.trim()){showToast('Enter a program name!','err');return;}
  const idx=state.programs.findIndex(p=>p.id===state.editProg.id);
  if(idx>=0) state.programs[idx]=state.editProg;
  else state.programs.push(state.editProg);
  setState({editProg:null,programs_tab:'list'});
  showToast('Program saved! 🎯');
}
function editProg(id){
  const p=state.programs.find(x=>x.id===id);
  if(p) setState({editProg:JSON.parse(JSON.stringify(p)),programs_tab:'edit'});
}
function deleteProg(id){
  state.programs=state.programs.filter(x=>x.id!==id);
  if(state.activeProg?.progId===id) state.activeProg=null;
  showToast('Program deleted');render();
}
function startProg(id){
  setState({activeProg:{progId:id,cycle:1,sessionIdx:0,done:false},programs_tab:'progress'});
}
function addSession(){
  const n=state.editProg.sessions.length+1;
  state.editProg.sessions.push({id:uid(),label:`Day ${n}`,items:[{id:uid(),exId:INIT_EX[0].id,sets:'3',reps:'10',weight:'',restTime:'90'}]});
  render();
}
function removeSession(si){state.editProg.sessions.splice(si,1);render();}
function addItemToSession(si){
  state.editProg.sessions[si].items.push({id:uid(),exId:INIT_EX[0].id,sets:'3',reps:'10',weight:'',restTime:'90'});render();
}
function removeItemFromSession(si,ii){state.editProg.sessions[si].items.splice(ii,1);render();}
function applySession(){
  const ap=state.activeProg;
  if(!ap) return;
  const prog=state.programs.find(p=>p.id===ap.progId);
  if(!prog) return;
  const sess=prog.sessions[ap.sessionIdx];
  const today=todayStr();
  sess.items.forEach(it=>{
    state.logs.push({id:uid(),exerciseId:it.exId,date:today,
      sets:Array.from({length:+it.sets||1},()=>({reps:it.reps,weight:it.weight||'0'})),
      note:`[${prog.name}] Cycle ${ap.cycle} - ${sess.label}`
    });
  });
  const nextIdx=ap.sessionIdx+1;
  if(nextIdx>=prog.sessions.length){
    if(ap.cycle>=prog.totalCycles){
      state.activeProg={...ap,done:true};showToast(`🏆 ${prog.name} complete!`);
    }else{
      state.activeProg={...ap,cycle:ap.cycle+1,sessionIdx:0};showToast(`Cycle ${ap.cycle+1} started! 🔥`);
    }
  }else{
    state.activeProg={...ap,sessionIdx:nextIdx};showToast('Session logged! ▶ Next session');
  }
  setState({tab:'record',date:today});
}

/* ── bind DOM events after render ── */
function bindEvents(){}

/* ── INIT ── */
render();
</script>
</body>
